<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="חוג שייט">
<meta name="theme-color" content="#0a1628">
<title>חוג שייט | מרכז דניאל</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0a1628; --bg2:#0d2444; --bg3:#0e3060;
  --card:rgba(255,255,255,0.05); --border:rgba(255,255,255,0.09);
  --blue:#3b82f6; --blue-light:#7dd3fc;
  --green:#34d399; --red:#f87171; --yellow:#fbbf24;
  --text:#e0f2fe; --muted:#64748b;
  --radius:16px; --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body { height:100%; background:var(--bg); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:var(--text); overflow:hidden; }
#app { height:100vh; display:flex; flex-direction:column; }
.header { background:rgba(0,0,0,0.5); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding:12px 16px; padding-top:max(12px,env(safe-area-inset-top)); display:flex; align-items:center; gap:10px; flex-shrink:0; }
.header-title { font-size:15px; font-weight:800; color:var(--blue-light); }
.header-sub { font-size:10px; color:var(--muted); }
.header-logout { margin-right:auto; background:none; border:none; color:var(--muted); font-size:12px; cursor:pointer; padding:4px 8px; border-radius:6px; }
.content { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px; padding-bottom:calc(150px + var(--safe-bottom)); background:linear-gradient(160deg,var(--bg) 0%,var(--bg2) 50%,var(--bg3) 100%); }
.content-login { flex:1; overflow-y:auto; padding:32px 20px; display:flex; flex-direction:column; justify-content:center; background:linear-gradient(160deg,var(--bg) 0%,var(--bg2) 50%,var(--bg3) 100%); }
.bottom-nav { position:fixed; bottom:0; left:0; right:0; background:rgba(5,10,25,0.95); backdrop-filter:blur(20px); border-top:1px solid var(--border); display:flex; padding-bottom:var(--safe-bottom); z-index:100; }
.nav-btn { flex:1; padding:8px 2px; background:none; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:2px; color:var(--muted); font-size:9px; font-weight:600; }
.nav-btn.active { color:var(--blue-light); }
.nav-btn .icon { font-size:20px; line-height:1; }
.card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
.stats-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:16px; }
.stat-card { background:var(--card); border-radius:14px; padding:14px 10px; text-align:center; border:1px solid var(--border); }
.stat-icon { font-size:22px; margin-bottom:4px; }
.stat-val { font-size:22px; font-weight:800; }
.stat-label { font-size:10px; color:var(--muted); margin-top:2px; }
.section-title { font-size:13px; font-weight:700; color:var(--muted); margin-bottom:10px; }
.btn { border:none; cursor:pointer; font-weight:700; border-radius:12px; padding:14px 20px; font-size:15px; width:100%; display:block; text-align:center; transition:opacity 0.15s; }
.btn:active { opacity:0.8; }
.btn:disabled { opacity:0.4; cursor:not-allowed; }
.btn-primary { background:linear-gradient(135deg,#2563eb,#1d4ed8); color:white; box-shadow:0 4px 20px rgba(37,99,235,0.35); }
.btn-excel { background:linear-gradient(135deg,#166534,#15803d); color:white; }
.btn-sheets { background:linear-gradient(135deg,#1e40af,#1d4ed8); color:white; }
.btn-sm { padding:8px 14px; font-size:13px; border-radius:9px; width:auto; display:inline-block; }
.btn-ghost { background:rgba(255,255,255,0.06); color:var(--muted); border:1px solid var(--border); }
.btn-danger { background:rgba(239,68,68,0.15); color:var(--red); border:1px solid rgba(239,68,68,0.3); }
.btn-teal { background:linear-gradient(135deg,#0891b2,#0e7490); color:white; }
.form-group { margin-bottom:14px; }
.form-label { display:block; font-size:12px; color:var(--muted); font-weight:600; margin-bottom:6px; }
.form-input { width:100%; background:rgba(0,0,0,0.35); border:1px solid var(--border); color:var(--text); padding:12px 14px; border-radius:10px; font-size:16px; outline:none; -webkit-appearance:none; }
.form-input:focus { border-color:var(--blue); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.toggle-row { display:flex; gap:8px; }
.toggle-btn { flex:1; padding:11px 8px; border-radius:10px; border:1px solid var(--border); background:rgba(0,0,0,0.2); color:var(--muted); font-weight:700; font-size:13px; cursor:pointer; }
.toggle-btn.active { background:rgba(59,130,246,0.25); border-color:rgba(59,130,246,0.5); color:var(--blue-light); }
.size-row { display:flex; gap:6px; flex-wrap:wrap; }
.size-pill { padding:7px 12px; border-radius:8px; border:1px solid var(--border); background:rgba(0,0,0,0.2); color:var(--muted); font-weight:700; font-size:12px; cursor:pointer; }
.size-pill.active { background:rgba(59,130,246,0.25); border-color:rgba(59,130,246,0.5); color:var(--blue-light); }
input[type="date"],input[type="time"] { color-scheme:dark; }
select option { background:#0d2444; }
.day-picker { display:flex; gap:6px; flex-wrap:wrap; }
.day-pill { padding:9px 10px; border-radius:10px; border:1px solid var(--border); background:rgba(0,0,0,0.2); color:var(--muted); font-weight:700; font-size:13px; cursor:pointer; min-width:40px; text-align:center; }
.day-pill.active { background:rgba(59,130,246,0.25); border-color:rgba(59,130,246,0.5); color:var(--blue-light); }
.week-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; gap:8px; }
.week-title { font-size:13px; font-weight:800; text-align:center; flex:1; }
.week-arrow { background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:8px 14px; cursor:pointer; font-size:16px; flex-shrink:0; }
.day-block { margin-bottom:14px; }
.day-header { font-size:12px; font-weight:700; color:var(--muted); margin-bottom:6px; padding:6px 0; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.day-header.today-hdr { color:var(--blue-light); border-bottom-color:rgba(59,130,246,0.4); }
.sched-item { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--card); border-radius:12px; margin-bottom:6px; border-right:3px solid transparent; cursor:pointer; }
.sched-item:active { opacity:0.8; }
.group-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:12px; cursor:pointer; }
.group-card:active { border-color:var(--blue-light); }
.sailor-card { display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; margin-bottom:10px; }
.avatar { width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:19px; flex-shrink:0; }
.avatar-male { background:linear-gradient(135deg,#2563eb30,#1e40af40); }
.avatar-female { background:linear-gradient(135deg,#ec489930,#be185d40); }
.attend-row { display:flex; align-items:center; gap:12px; padding:14px; border-radius:14px; margin-bottom:8px; cursor:pointer; border:1px solid transparent; -webkit-user-select:none; user-select:none; }
.attend-row.present { background:rgba(52,211,153,0.1); border-color:rgba(52,211,153,0.25); }
.attend-row.absent { background:rgba(255,255,255,0.03); border-color:rgba(255,255,255,0.07); }
.attend-check { width:36px; height:36px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:800; margin-right:auto; }
.attend-check.present { background:rgba(52,211,153,0.25); border:2px solid var(--green); color:var(--green); }
.attend-check.absent { background:rgba(239,68,68,0.1); border:2px solid rgba(239,68,68,0.3); color:var(--red); }
.progress-bar { height:5px; background:rgba(255,255,255,0.08); border-radius:3px; overflow:hidden; margin-top:8px; }
.progress-fill { height:100%; border-radius:3px; }
.dots-row { display:flex; gap:3px; flex-wrap:wrap; margin-top:8px; }
.dot { width:12px; height:12px; border-radius:3px; }
.back-btn { background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; padding:0; margin-bottom:16px; display:flex; align-items:center; gap:4px; }
.counter-pill { background:rgba(52,211,153,0.15); border:1px solid rgba(52,211,153,0.3); border-radius:20px; padding:5px 14px; font-size:13px; font-weight:700; color:var(--green); }
.session-item { display:flex; justify-content:space-between; align-items:center; padding:12px 14px; background:var(--card); border:1px solid var(--border); border-radius:12px; margin-bottom:8px; cursor:pointer; }
.session-item:active { border-color:var(--blue-light); }
.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:#1e293b; border:1px solid var(--border); border-radius:12px; padding:12px 20px; font-size:14px; font-weight:600; z-index:200; opacity:0; transition:opacity 0.3s; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; }
.spinner { display:inline-block; width:18px; height:18px; border:2px solid rgba(255,255,255,0.2); border-top-color:white; border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-left:8px; }
@keyframes spin { to { transform:rotate(360deg); } }
.login-logo { font-size:64px; text-align:center; margin-bottom:16px; }
.login-title { font-size:24px; font-weight:800; text-align:center; color:var(--blue-light); margin-bottom:4px; }
.login-sub { font-size:13px; text-align:center; color:var(--muted); margin-bottom:40px; }
.login-box { background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:20px; padding:24px; }
.badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:700; }
.badge-warn { background:rgba(239,68,68,0.2); color:var(--red); }
.today-badge { background:rgba(59,130,246,0.2); color:var(--blue-light); border-radius:6px; padding:1px 6px; font-size:10px; font-weight:700; }
@media(min-width:500px){
  .content,.content-login { max-width:480px; margin:0 auto; }
  .bottom-nav { max-width:480px; left:50%; transform:translateX(-50%); border-radius:20px 20px 0 0; }
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <span style="font-size:24px">⛵</span>
    <div>
      <div class="header-title">מרכז דניאל לחתירה</div>
      <div class="header-sub" id="header-sub">חוג שייט | עיריית תל אביב-יפו</div>
    </div>
    <button class="header-logout" id="logout-btn" onclick="logout()" style="display:none">יציאה ↩</button>
  </div>
  <div id="main-content" class="content-login">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;color:var(--muted)">
      <div class="spinner" style="width:36px;height:36px;border-width:3px"></div><p>טוען...</p>
    </div>
  </div>
  <nav class="bottom-nav" id="bottom-nav" style="display:none">
    <button class="nav-btn active" id="nav-schedule" onclick="navigate('schedule')"><span class="icon">📅</span>לוח</button>
    <button class="nav-btn"        id="nav-sailors"  onclick="navigate('sailors')"> <span class="icon">👥</span>חניכים</button>
    <button class="nav-btn"        id="nav-history"  onclick="navigate('history')"> <span class="icon">📊</span>היסטוריה</button>
    <button class="nav-btn"        id="nav-home"     onclick="navigate('home')">    <span class="icon">⚙️</span>הגדרות</button>
  </nav>
</div>
<div class="toast" id="toast"></div>
<script>
const SUPA_URL = "https://ukmjspvhvughrdjexqwu.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVrbWpzcHZodnVnaHJkamV4cXd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NTg0NjAsImV4cCI6MjA4ODAzNDQ2MH0.ZnMMPuN6qiC5eMO2c5-t00KX_HKu7ynLzrIaUB9C8dY";
const BOATS  = ["Optimist","RS Feva","RS Toura"];
const SIZES  = ["XS","S","M","L","XL","XXL"];
const COLORS = ["#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6","#06b6d4","#ec4899"];
const DAYS_SHORT = ["א׳","ב׳","ג׳","ד׳","ה׳","ו׳","ש׳"];
const DAYS_LONG  = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];

let APP = {
  coach:null, groups:[], sailors:[], sessions:[], attendance:{},
  allCoaches:[], allGroups:[],
  view:"home", subView:null,
  activeGroupId:null, activeSession:null,
  form:emptyForm(), editId:null,
  groupForm:emptyGF(), editGroupId:null,
  weekOffset:0,
};
function emptyForm(){ return {first_name:"",last_name:"",birth_date:"",join_date:today(),shirt_size:"M",parent_name:"",parent_phone:"",gender:"male",boat:"Optimist"}; }
function emptyGF(){ return {name:"",color:COLORS[0],days_of_week:[],start_time:"",end_time:""}; }

// ── Supabase ──────────────────────────────────────────────────
async function sb(path,method="GET",body=null){
  const opts={method,headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY,"Content-Type":"application/json","Prefer":method==="POST"?"return=representation":""}};
  if(body) opts.body=JSON.stringify(body);
  const res=await fetch(SUPA_URL+"/rest/v1/"+path,opts);
  if(!res.ok){const e=await res.text();throw new Error(e);}
  const t=await res.text(); return t?JSON.parse(t):null;
}
const dbGet    = (t,q="",ord="created_at.asc") => sb(t+"?"+q+(ord?"&order="+ord:""));
const dbPost   = (t,b)   => sb(t,"POST",b);
const dbPatch  = (t,q,b) => sb(t+"?"+q,"PATCH",b);
const dbDelete = (t,q)   => sb(t+"?"+q,"DELETE");

// ── Helpers ───────────────────────────────────────────────────
function uid(){ return Math.random().toString(36).substr(2,9); }
function today(){ return new Date().toISOString().split("T")[0]; }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function toISO(d){ return d.toISOString().split("T")[0]; }
function fmtShort(d){ if(!d)return""; const dt=new Date(d+"T00:00:00"); return String(dt.getDate()).padStart(2,"0")+"/"+String(dt.getMonth()+1).padStart(2,"0"); }
function fmtFull(d){ if(!d)return""; const dt=new Date(d+"T00:00:00"); return fmtShort(d)+"/"+dt.getFullYear(); }
function fmtLong(d){ if(!d)return""; return new Intl.DateTimeFormat("he-IL",{weekday:"long",year:"numeric",month:"long",day:"numeric"}).format(new Date(d+"T00:00:00")); }
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }
function showToast(msg,ms=2200){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),ms); }
function rateColor(r){ if(r===null)return"#64748b"; return r>=75?"#34d399":r>=50?"#fbbf24":"#f87171"; }
function getGroup(id){ return APP.groups.find(g=>g.id===id); }
function groupSailors(gid){ const g=getGroup(gid); if(!g)return[]; return (g.sailorIds||[]).map(id=>APP.sailors.find(s=>s.id===id)).filter(Boolean); }
function groupSessions(gid){ return APP.sessions.filter(s=>s.group_id===gid); }
function attendRate(sailor,sessions){
  const jd=sailor.join_date||"2000-01-01";
  const rel=sessions.filter(s=>s.date>=jd&&APP.attendance[s.id]&&APP.attendance[s.id][sailor.id]!==undefined);
  if(!rel.length)return null;
  return Math.round(rel.filter(s=>APP.attendance[s.id][sailor.id]).length/rel.length*100);
}
function saveLocal(){ try{localStorage.setItem("sailing_last",APP.coach?.id||"");}catch(e){} }
function loadLocalCoach(){ try{return localStorage.getItem("sailing_last");}catch(e){return null;} }

// ── weekStart: returns Sunday of week offset ──────────────────
function weekStart(offset=0){
  const d=new Date(); const dow=d.getDay();
  d.setDate(d.getDate()-dow+offset*7); d.setHours(0,0,0,0); return d;
}

// ── Load ──────────────────────────────────────────────────────
async function loadAll(){
  const cid=APP.coach.id;
  const groups=await dbGet("groups",`coach_id=eq.${cid}`);
  const gids=groups.map(g=>g.id);
  let gsMap={};
  if(gids.length){
    const gs=await dbGet("group_sailors",`group_id=in.(${gids.join(",")})`, "");
    gs.forEach(r=>{ if(!gsMap[r.group_id])gsMap[r.group_id]=[]; gsMap[r.group_id].push(r.sailor_id); });
  }
  APP.groups=groups.map(g=>({...g,sailorIds:gsMap[g.id]||[],days_of_week:g.days_of_week||[]}));
  const allSids=[...new Set(APP.groups.flatMap(g=>g.sailorIds))];
  APP.sailors=allSids.length?await dbGet("sailors",`id=in.(${allSids.join(",")})`):[]; 
  APP.sessions=gids.length?await dbGet("sessions",`group_id=in.(${gids.join(",")})`):[]; 
  APP.attendance={};
  const sids=APP.sessions.map(s=>s.id);
  if(sids.length){
    const att=await dbGet("attendance",`session_id=in.(${sids.join(",")})`, "");
    att.forEach(r=>{ if(!APP.attendance[r.session_id])APP.attendance[r.session_id]={}; APP.attendance[r.session_id][r.sailor_id]=r.present; });
  }
}

async function loadScheduleData(){
  APP.allCoaches=await dbGet("coaches","","name.asc");
  APP.allGroups=(await dbGet("groups","","name.asc")).map(g=>({...g,days_of_week:g.days_of_week||[]}));
}

// ── Auth ──────────────────────────────────────────────────────
async function tryLogin(){
  const id=(document.getElementById("login-id")?.value||"").trim();
  const name=(document.getElementById("login-name")?.value||"").trim();
  if(!id){showToast("⚠️ נא להזין תעודת זהות");return;}
  const btn=document.getElementById("login-btn");
  btn.disabled=true; btn.innerHTML='טוען... <span class="spinner"></span>';
  try{
    const ex=await dbGet("coaches",`id=eq.${id}`);
    if(ex.length){APP.coach=ex[0];}
    else{
      if(!name){showToast("⚠️ נא להזין שמך");btn.disabled=false;btn.textContent="כניסה →";return;}
      APP.coach=(await dbPost("coaches",{id,name}))[0];
    }
    saveLocal(); await loadAll(); showApp();
  }catch(e){showToast("❌ "+e.message);btn.disabled=false;btn.textContent="כניסה →";}
}

async function logout(){
  APP.coach=null;APP.groups=[];APP.sailors=[];APP.sessions=[];APP.attendance={};APP.allCoaches=[];APP.allGroups=[];
  APP.view="home";APP.subView=null;APP.activeGroupId=null;APP.activeDate=null;
  document.getElementById("bottom-nav").style.display="none";
  document.getElementById("logout-btn").style.display="none";
  document.getElementById("header-sub").textContent="חוג שייט | עיריית תל אביב-יפו";
  renderLogin();
}
function showApp(){
  document.getElementById("bottom-nav").style.display="flex";
  document.getElementById("logout-btn").style.display="block";
  document.getElementById("header-sub").textContent=APP.coach?.name||"";
  APP.view="schedule";APP.subView=null;APP.activeDate=null;
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById("nav-schedule").classList.add("active");
  loadScheduleData().then(renderPage);
}

// ── Navigation ────────────────────────────────────────────────
function navigate(view){
  APP.view=view;APP.subView=null;
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  const nb=document.getElementById("nav-"+view); if(nb)nb.classList.add("active");
if(view==="schedule") loadScheduleData().then(renderPage); 
  else if(view==="home") renderPage();
  else renderPage();
}
function goBack(){
  if(APP.subView==="addSailor"||APP.subView==="editSailor"){APP.subView=null;APP.editId=null;renderPage();}
  else if(APP.subView==="addGroup"||APP.subView==="editGroup"){APP.subView=null;APP.editGroupId=null;renderPage();}
  else if(APP.subView==="session"){APP.subView=null;APP.activeSession=null;renderPage();}
  else if(APP.subView==="assignSailors"){APP.subView="groupDetail";renderPage();}
  else if(APP.subView==="groupDetail"){
    APP.subView=null;APP.activeGroupId=null;APP.activeDate=null;
    if(APP.view==="schedule"){loadScheduleData().then(renderPage);}else{renderPage();}
  }
  else{navigate("home");}
}
function setContent(html,isLogin=false){
  const mc=document.getElementById("main-content");
  mc.className=isLogin?"content-login":"content";
  mc.innerHTML=html; mc.scrollTop=0;
}

// ── Group actions ─────────────────────────────────────────────
async function saveGroup(){
  const f=APP.groupForm;
  if(!f.name.trim()){showToast("⚠️ נא להזין שם קבוצה");return;}

// ── Session actions ───────────────────────────────────────────
async function openSession(date,groupId){
  APP.activeGroupId=groupId;
  const existing=APP.sessions.find(s=>s.date===date&&s.group_id===groupId);
  if(existing){
    APP.activeSession={...existing};
    if(!APP.attendance[existing.id])APP.attendance[existing.id]={};
    const g=getGroup(groupId);
    if(g)for(const sid of g.sailorIds){
      if(APP.attendance[existing.id][sid]===undefined){
        APP.attendance[existing.id][sid]=false;
        try{await dbPost("attendance",{session_id:existing.id,sailor_id:sid,present:false});}catch(e){}
      }
    }
  }else{
    try{
      const sess=(await dbPost("sessions",{group_id:groupId,date}))[0];
      APP.sessions.push(sess);APP.activeSession={...sess};APP.attendance[sess.id]={};
      const g=getGroup(groupId);
      if(g)for(const sid of g.sailorIds){
        await dbPost("attendance",{session_id:sess.id,sailor_id:sid,present:false});
        APP.attendance[sess.id][sid]=false;
      }
    }catch(e){showToast("❌ "+e.message);return;}
  }
  APP.subView="session";renderPage();
}
async function toggleAttendance(sid){
  const sess=APP.activeSession;if(!sess)return;
  const next=!(APP.attendance[sess.id]?.[sid]||false);
  if(!APP.attendance[sess.id])APP.attendance[sess.id]={};
  APP.attendance[sess.id][sid]=next;
  const row=document.getElementById("arow-"+sid);
  const check=document.getElementById("acheck-"+sid);
  if(row)row.className="attend-row "+(next?"present":"absent");
  if(check){check.className="attend-check "+(next?"present":"absent");check.textContent=next?"✓":"✗";}
  const cnt=Object.values(APP.attendance[sess.id]).filter(Boolean).length;
  const total=Object.keys(APP.attendance[sess.id]).length;
  const counter=document.getElementById("attend-counter");
  if(counter)counter.textContent=`${cnt}/${total}`;
  try{await dbPatch("attendance",`session_id=eq.${sess.id}&sailor_id=eq.${sid}`,{present:next});}
  catch(e){showToast("❌ שגיאת שמירה");}
}
async function toggleAll(){
  const sess=APP.activeSession;if(!sess)return;
  const att=APP.attendance[sess.id]||{};
  const ids=Object.keys(att);
  const next=!ids.every(id=>att[id]);
  ids.forEach(id=>{APP.attendance[sess.id][id]=next;});
  renderPage();
  try{for(const sid of ids)await dbPatch("attendance",`session_id=eq.${sess.id}&sailor_id=eq.${sid}`,{present:next});}
  catch(e){showToast("❌ שגיאה");}
}

// ── Export ────────────────────────────────────────────────────
function toCSV(rows){return rows.map(r=>r.map(c=>{const s=String(c??"");return(s.includes(",")||s.includes('"')||s.includes("\n"))?`"${s.replace(/"/g,'""')}"`:s;}).join(",")).join("\n");}
function dlCSV(content,name){const blob=new Blob(["\uFEFF"+content],{type:"text/csv;charset=utf-8;"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click();}
function exportGroup(gid){
  const g=getGroup(gid);if(!g)return;
  const sess=groupSessions(gid).sort((a,b)=>a.date.localeCompare(b.date));
  const sailors=groupSailors(gid);
  const rows=[["שם מלא","סירה","הצטרפות",...sess.map(s=>fmtShort(s.date)),"%"],...sailors.map(s=>{
    const jd=s.join_date||"2000-01-01";
    const rel=sess.filter(x=>x.date>=jd);
    const marks=sess.map(x=>{if(x.date<jd)return"—";return(APP.attendance[x.id]||{})[s.id]?"✓":"✗";});
    const pct=rel.length?Math.round(rel.filter(x=>(APP.attendance[x.id]||{})[s.id]).length/rel.length*100)+"%":"—";
    return[s.first_name+" "+s.last_name,s.boat,s.join_date||"",...marks,pct];
  })];
  dlCSV(toCSV(rows),`${g.name}_${today()}.csv`);showToast("📥 הורד!");
}
function exportGroupSheets(gid){exportGroup(gid);setTimeout(()=>window.open("https://sheets.new","_blank"),400);}

// ── Schedule ──────────────────────────────────────────────────
function renderSchedule(){
  const offset=APP.weekOffset;
  const ws=weekStart(offset);
  const days=Array.from({length:7},(_,i)=>addDays(ws,i));
  const todayStr=today();
  const d0=fmtFull(toISO(days[0])), d6=fmtFull(toISO(days[6]));

  // build map
  const map={};
  days.forEach(d=>{map[toISO(d)]=[];});
  APP.allGroups.forEach(g=>{
    const coach=APP.allCoaches.find(c=>c.id===g.coach_id);
    const isMe=g.coach_id===APP.coach?.id;
    (g.days_of_week||[]).forEach(dow=>{
      const dayD=days.find(d=>d.getDay()===dow);
      if(dayD){const ds=toISO(dayD);if(map[ds])map[ds].push({g,coach,isMe});}
    });
  });

  return `
    <h2 style="font-size:20px;font-weight:800;margin-bottom:14px">📅 לוח שבועי</h2>

    ${days.map(d=>{
      const ds=toISO(d);

      const dow=d.getDay();
      return `<div class="day-block">
        <div class="day-header ${isToday?"today-hdr":""}">
          <span>${DAYS_LONG[dow]} ${fmtFull(ds)}</span>
          ${isToday?`<span class="today-badge">היום</span>`:""}
        </div>
        ${items.length===0?`<div style="font-size:12px;color:var(--muted);padding:6px 0 2px;padding-right:4px">אין פעילות</div>`

            <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;${isMe?"cursor:pointer":""}" ${isMe?`onclick="APP.activeGroupId='${g.id}';APP.activeDate='${ds}';APP.subView='groupDetail';renderPage()"`:""}>

    </div>`:""}

      <div class="section-title" style="margin-bottom:0">חניכים (${sailors.length})</div>
      <button class="btn btn-primary btn-sm" onclick="APP.form=emptyForm();APP.editId=null;APP.subView='addSailor';renderPage()">+ חדש</button>
    </div>
    ${sailors.length===0?`<div style="text-align:center;padding:30px;color:var(--muted)">
      <p>אין חניכים בקבוצה</p>
      <button class="btn btn-ghost btn-sm" style="margin-top:10px" onclick="APP.subView='assignSailors';renderPage()">הוסף חניכים קיימים</button>
    </div>`:sailors.map(s=>{
      const r=attendRate(s,groupSessions(g.id));const rc=rateColor(r);
      return `<div class="sailor-card">
        <div class="avatar avatar-${s.gender}">${s.gender==="female"?"👧":"👦"}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:14px">${esc(s.first_name)} ${esc(s.last_name)}</div>
          <div style="font-size:11px;color:var(--muted)">🚢 ${s.boat} · 👕 ${s.shirt_size}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${r!==null?`<div style="font-size:15px;font-weight:800;color:${rc}">${r}%</div>`:""}
          <button class="btn btn-ghost btn-sm" onclick="startEditSailor('${s.id}')">✏️</button>
        </div>
      </div>`;
    }).join("")}
  `;
}

// ── Assign sailors ────────────────────────────────────────────
function renderAssignSailors(){
  const g=getGroup(APP.activeGroupId);if(!g){goBack();return"";}
  return `
    <button class="back-btn" onclick="APP.subView='groupDetail';renderPage()">← חזרה</button>
    <h2 style="font-size:18px;font-weight:800;margin-bottom:4px">שיוך חניכים ל-${esc(g.name)}</h2>
    <p style="color:var(--muted);font-size:12px;margin-bottom:16px">לחץ להוספה/הסרה מהקבוצה</p>
    <button class="btn btn-primary btn-sm" style="margin-bottom:14px" onclick="APP.form=emptyForm();APP.editId=null;APP.subView='addSailor';renderPage()">+ חניך חדש</button>
    ${APP.sailors.length===0?`<div style="text-align:center;padding:30px;color:var(--muted)">אין חניכים עדיין</div>`
    :APP.sailors.map(s=>{
      const inGroup=g.sailorIds.includes(s.id);
      return `<div class="sailor-card">
        <div class="avatar avatar-${s.gender}">${s.gender==="female"?"👧":"👦"}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:14px">${esc(s.first_name)} ${esc(s.last_name)}</div>
          <div style="font-size:11px;color:var(--muted)">🚢 ${s.boat}</div>
        </div>
        <button id="assign-${s.id}" class="btn btn-sm ${inGroup?"btn-teal":"btn-ghost"}" onclick="toggleGroupMember('${s.id}')">${inGroup?"✓ בקבוצה":"+ הוסף"}</button>
      </div>`;
    }).join("")}
  `;
}

// ── All sailors ───────────────────────────────────────────────
function renderSailors(){
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="font-size:20px;font-weight:800">👥 כל החניכים</h2>
      <button class="btn btn-primary btn-sm" onclick="APP.activeGroupId=null;APP.form=emptyForm();APP.editId=null;APP.subView='addSailor';renderPage()">+ הוסף</button>
    </div>
    ${APP.sailors.length===0?`<div style="text-align:center;padding:60px 0;color:var(--muted)"><div style="font-size:48px">👥</div><p style="margin-top:12px">עוד אין חניכים</p></div>`
    :APP.sailors.map(s=>{
      const groups=APP.groups.filter(g=>g.sailorIds.includes(s.id));
      const allSess=APP.sessions.filter(x=>APP.attendance[x.id]&&APP.attendance[x.id][s.id]!==undefined);
      const r=attendRate(s,allSess);const rc=rateColor(r);
      return `<div class="sailor-card">
        <div class="avatar avatar-${s.gender}">${s.gender==="female"?"👧":"👦"}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:14px">${esc(s.first_name)} ${esc(s.last_name)}</div>
          <div style="font-size:11px;color:var(--muted)">🚢 ${s.boat} · 👕 ${s.shirt_size}</div>
          ${groups.length?`<div style="margin-top:3px">${groups.map(g=>`<span style="background:${g.color}22;border:1px solid ${g.color}55;border-radius:6px;padding:1px 6px;font-size:10px;color:${g.color};margin-left:3px">${esc(g.name)}</span>`).join("")}</div>`:""}
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${r!==null?`<div style="font-size:15px;font-weight:800;color:${rc}">${r}%</div>`:""}
          <button class="btn btn-ghost btn-sm" onclick="startEditSailor('${s.id}')">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="deleteSailor('${s.id}')">✕</button>
        </div>
      </div>`;
    }).join("")}
  `;
}

// ── Sailor form ───────────────────────────────────────────────
function renderSailorForm(){
  const f=APP.form;const isEdit=!!APP.editId;
  const g=APP.activeGroupId?getGroup(APP.activeGroupId):null;
  return `
    <button class="back-btn" onclick="APP.editId=null;APP.subView=APP.activeGroupId?'groupDetail':null;renderPage()">${g?"← חזרה לקבוצה":"← חזרה"}</button>
    <h2 style="font-size:20px;font-weight:800;margin-bottom:20px">${isEdit?"✏️ עריכת חניך":"⛵ הוסף חניך חדש"}</h2>
    ${g&&!isEdit?`<div style="background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);border-radius:10px;padding:8px 12px;margin-bottom:14px;font-size:12px;color:var(--blue-light)">✓ יתווסף אוטומטית לקבוצה ${esc(g.name)}</div>`:""}
    <div class="form-row">
      <div class="form-group"><label class="form-label">שם פרטי *</label><input class="form-input" value="${esc(f.first_name)}" oninput="APP.form.first_name=this.value" inputmode="text"></div>
      <div class="form-group"><label class="form-label">שם משפחה *</label><input class="form-input" value="${esc(f.last_name)}" oninput="APP.form.last_name=this.value" inputmode="text"></div>
    </div>
    <div class="form-group"><label class="form-label">מגדר</label>
      <div class="toggle-row">
        <button class="toggle-btn ${f.gender==="male"?"active":""}" data-gender="male" onclick="setGender('male')">👦 בן</button>
        <button class="toggle-btn ${f.gender==="female"?"active":""}" data-gender="female" onclick="setGender('female')">👧 בת</button>
      </div>
    </div>
    <div class="form-group"><label class="form-label">סירה</label>
      <select class="form-input" onchange="APP.form.boat=this.value">${BOATS.map(b=>`<option ${f.boat===b?"selected":""}>${b}</option>`).join("")}</select>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">תאריך לידה</label><input type="date" class="form-input" value="${esc(f.birth_date)}" onchange="APP.form.birth_date=this.value"></div>
      <div class="form-group"><label class="form-label">תאריך הצטרפות</label><input type="date" class="form-input" value="${esc(f.join_date||today())}" onchange="APP.form.join_date=this.value"></div>
    </div>
    <div class="form-group"><label class="form-label">מידת חולצה</label>
      <div class="size-row">${SIZES.map(sz=>`<button class="size-pill ${f.shirt_size===sz?"active":""}" data-size="${sz}" onclick="setSize('${sz}')">${sz}</button>`).join("")}</div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">שם הורה</label><input class="form-input" value="${esc(f.parent_name)}" oninput="APP.form.parent_name=this.value"></div>
      <div class="form-group"><label class="form-label">טלפון הורה</label><input type="tel" class="form-input" value="${esc(f.parent_phone)}" oninput="APP.form.parent_phone=this.value"></div>
    </div>
    <button class="btn btn-primary" onclick="saveSailor()">${isEdit?"💾 שמור שינויים":"⛵ הוסף חניך"}</button>
  `;
}

// ── Group form ────────────────────────────────────────────────
function renderGroupForm(){
  const f=APP.groupForm;const isEdit=!!APP.editGroupId;
  return `
    <button class="back-btn" onclick="APP.subView=null;APP.editGroupId=null;renderPage()">← חזרה</button>
    <h2 style="font-size:20px;font-weight:800;margin-bottom:20px">${isEdit?"✏️ עריכת קבוצה":"🏊 קבוצה חדשה"}</h2>
    <div class="form-group">
      <label class="form-label">שם הקבוצה *</label>
      <input class="form-input" value="${esc(f.name)}" oninput="APP.groupForm.name=this.value" placeholder="לדוגמה: אופטימיסט מתקדמים">
    </div>
    <div class="form-group">
      <label class="form-label">צבע</label>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px">
        ${COLORS.map(c=>`<div class="color-dot" data-color="${c}" onclick="setGroupColor('${c}')" style="width:32px;height:32px;border-radius:50%;background:${c};cursor:pointer;outline:${c===f.color?"3px solid white":"none"};outline-offset:2px"></div>`).join("")}
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">ימי פעילות</label>
      <div class="day-picker">
        ${DAYS_SHORT.map((n,i)=>`<button class="day-pill ${(f.days_of_week||[]).includes(i)?"active":""}" data-day="${i}" onclick="toggleDay(${i})">${n}</button>`).join("")}
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:6px">א׳=ראשון, ב׳=שני, ג׳=שלישי, ד׳=רביעי, ה׳=חמישי, ו׳=שישי, ש׳=שבת</div>
    </div>
    <div class="form-group">
      <label class="form-label">שעות פעילות</label>
      <div class="form-row">
        <div>
          <label class="form-label" style="font-size:11px">התחלה</label>
          <input type="time" class="form-input" value="${esc(f.start_time)}" onchange="APP.groupForm.start_time=this.value">
        </div>
        <div>
          <label class="form-label" style="font-size:11px">סיום</label>
          <input type="time" class="form-input" value="${esc(f.end_time)}" onchange="APP.groupForm.end_time=this.value">
        </div>
      </div>
    </div>
    <button class="btn btn-primary" onclick="saveGroup()">${isEdit?"💾 שמור שינויים":"✅ צור קבוצה"}</button>
  `;
}

// ── Session ───────────────────────────────────────────────────
function renderSession(){
  const sess=APP.activeSession;if(!sess){goBack();return"";}
  const g=getGroup(sess.group_id);
  const att=APP.attendance[sess.id]||{};
  const ids=Object.keys(att);
  const cnt=ids.filter(id=>att[id]).length;
  const allPresent=ids.length>0&&ids.every(id=>att[id]);
  return `
    <button class="back-btn" onclick="APP.subView='groupDetail';APP.activeGroupId='${sess.group_id}';renderPage()">← חזרה לקבוצה</button>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div>
        <h2 style="font-size:17px;font-weight:800">✅ נוכחות — ${esc(g?.name||"")}</h2>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${fmtLong(sess.date)}</div>
      </div>
      <span class="counter-pill" id="attend-counter">${cnt}/${ids.length}</span>
    </div>
    ${ids.length===0?`<div style="text-align:center;padding:40px;color:var(--muted)">אין חניכים בקבוצה</div>`:`
    <button class="btn btn-ghost btn-sm" style="margin-bottom:12px;width:auto" onclick="toggleAll()">${allPresent?"בטל הכל ✗":"סמן הכל ✓"}</button>
    ${ids.map(sid=>{
      const s=APP.sailors.find(x=>x.id===sid);const p=att[sid];
      return `<div id="arow-${sid}" class="attend-row ${p?"present":"absent"}" onclick="toggleAttendance('${sid}')">
        <div class="avatar avatar-${s?.gender||"male"}" style="width:38px;height:38px;font-size:18px">${s?.gender==="female"?"👧":"👦"}</div>
        <div><div style="font-weight:700;font-size:15px">${s?esc(s.first_name)+" "+esc(s.last_name):"?"}</div><div style="font-size:11px;color:var(--muted)">${s?.boat||""}</div></div>
        <div id="acheck-${sid}" class="attend-check ${p?"present":"absent"}">${p?"✓":"✗"}</div>
      </div>`;
    }).join("")}
    <div style="text-align:center;margin-top:12px;font-size:12px;color:var(--muted)">💾 נשמר אוטומטית לשרת</div>`}
  `;
}

// ── History ───────────────────────────────────────────────────
function renderHistory(){
  if(!APP.groups.length)return`<h2 style="font-size:20px;font-weight:800;margin-bottom:20px">📊 היסטוריה</h2>
    <div style="text-align:center;padding:60px 0;color:var(--muted)"><div style="font-size:48px">📊</div><p style="margin-top:12px">עוד אין נתונים</p></div>`;
  return`<h2 style="font-size:20px;font-weight:800;margin-bottom:16px">📊 היסטוריה</h2>
    ${APP.groups.map(g=>{
      const sess=groupSessions(g.id).sort((a,b)=>a.date.localeCompare(b.date));
      const sailors=groupSailors(g.id);
      if(!sess.length&&!sailors.length)return"";
      return`<div class="card" style="border-right:3px solid ${g.color}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div style="font-weight:800;font-size:15px">${esc(g.name)}</div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-excel btn-sm" onclick="exportGroup('${g.id}')">📥</button>
            <button class="btn btn-sheets btn-sm" onclick="exportGroupSheets('${g.id}')">📊</button>
          </div>
        </div>
        ${sailors.length===0?`<p style="color:var(--muted);font-size:12px">אין חניכים</p>`
        :sailors.map(s=>{
          const r=attendRate(s,sess);const rc=rateColor(r);
          const jd=s.join_date||"2000-01-01";
          const rel=sess.filter(x=>x.date>=jd);
          const attended=rel.filter(x=>(APP.attendance[x.id]||{})[s.id]).length;
          const missed=rel.length-attended;
          const dots=sess.slice(-12).map(x=>{
            if(x.date<jd)return`<div class="dot" style="background:#1e3a5f"></div>`;
            const p=(APP.attendance[x.id]||{})[s.id];
            return`<div class="dot" style="background:${p?"#34d399":"#ef4444"};opacity:${p?0.8:0.4}"></div>`;
          }).join("");
          return`<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div><span style="font-weight:700;font-size:13px">${esc(s.first_name)} ${esc(s.last_name)}</span>
              ${missed>=3?`<span class="badge badge-warn" style="margin-right:6px">⚠️ ${missed}</span>`:""}</div>
              <div><span style="font-size:17px;font-weight:800;color:${rc}">${r!==null?r+"%":"—"}</span><span style="font-size:10px;color:var(--muted);margin-right:4px">${attended}/${rel.length}</span></div>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:${r||0}%;background:${rc}"></div></div>
            <div class="dots-row">${dots}</div>
          </div>`;
        }).join("")}
      </div>`;
    }).join("")}`;
}

// ── Init ──────────────────────────────────────────────────────
(async()=>{
  const lastId=loadLocalCoach();
  if(lastId){
    try{
      const res=await dbGet("coaches",`id=eq.${lastId}`);
      if(res.length){APP.coach=res[0];await loadAll();showApp();return;}
    }catch(e){}
  }
  renderLogin();
})();
</script>
</body>
</html>
