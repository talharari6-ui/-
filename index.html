<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a1628">
<title>חוג שייט | מרכז דניאל</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a1628;--bg2:#0d2444;--bg3:#0e3060;
  --card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.09);
  --blue:#3b82f6;--blue-light:#7dd3fc;
  --green:#34d399;--red:#f87171;--yellow:#fbbf24;--purple:#a78bfa;
  --text:#e0f2fe;--muted:#64748b;
  --radius:16px;--safe:env(safe-area-inset-bottom,0px)
}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);overflow:hidden}
#app{height:100vh;display:flex;flex-direction:column}
.hdr{background:rgba(0,0,0,0.5);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-title{font-size:15px;font-weight:800;color:var(--blue-light)}
.hdr-sub{font-size:10px;color:var(--muted)}
.hdr-out{margin-right:auto;background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:4px 8px;border-radius:6px}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:calc(150px + var(--safe));background:linear-gradient(160deg,var(--bg) 0%,var(--bg2) 50%,var(--bg3) 100%)}
.content-login{flex:1;overflow-y:auto;padding:32px 20px;display:flex;flex-direction:column;justify-content:center;background:linear-gradient(160deg,var(--bg) 0%,var(--bg2) 50%,var(--bg3) 100%)}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(5,10,25,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe);z-index:100}
.nb{flex:1;padding:8px 2px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);font-size:9px;font-weight:600}
.nb.active{color:var(--blue-light)}
.nb .ic{font-size:20px;line-height:1}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.sc{background:var(--card);border-radius:14px;padding:14px 10px;text-align:center;border:1px solid var(--border)}
.si{font-size:22px;margin-bottom:4px}
.sv{font-size:22px;font-weight:800}
.sl{font-size:10px;color:var(--muted);margin-top:2px}
.stitle{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px}
.btn{border:none;cursor:pointer;font-weight:700;border-radius:12px;padding:14px 20px;font-size:15px;width:100%;display:block;text-align:center;transition:opacity 0.15s}
.btn:active{opacity:0.8}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-p{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:white;box-shadow:0 4px 20px rgba(37,99,235,0.35)}
.btn-g{background:rgba(255,255,255,0.06);color:var(--muted);border:1px solid var(--border)}
.btn-d{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3)}
.btn-t{background:linear-gradient(135deg,#0891b2,#0e7490);color:white}
.btn-ex{background:linear-gradient(135deg,#166534,#15803d);color:white}
.btn-sh{background:linear-gradient(135deg,#1e40af,#1d4ed8);color:white}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:9px;width:auto;display:inline-block}
.btn-pur{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:white}
.fg{margin-bottom:14px}
.fl{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}
.fi{width:100%;background:rgba(0,0,0,0.35);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:10px;font-size:16px;outline:none;-webkit-appearance:none}
.fi:focus{border-color:var(--blue)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.trow{display:flex;gap:8px}
.tbtn{flex:1;padding:11px 8px;border-radius:10px;border:1px solid var(--border);background:rgba(0,0,0,0.2);color:var(--muted);font-weight:700;font-size:13px;cursor:pointer}
.tbtn.active{background:rgba(59,130,246,0.25);border-color:rgba(59,130,246,0.5);color:var(--blue-light)}
.spill{padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(0,0,0,0.2);color:var(--muted);font-weight:700;font-size:12px;cursor:pointer}
.spill.active{background:rgba(59,130,246,0.25);border-color:rgba(59,130,246,0.5);color:var(--blue-light)}
input[type=date],input[type=time]{color-scheme:dark}
select option{background:#0d2444}
.dpick{display:flex;gap:6px;flex-wrap:wrap}
.dpill{padding:9px 10px;border-radius:10px;border:1px solid var(--border);background:rgba(0,0,0,0.2);color:var(--muted);font-weight:700;font-size:13px;cursor:pointer;min-width:40px;text-align:center}
.dpill.active{background:rgba(59,130,246,0.25);border-color:rgba(59,130,246,0.5);color:var(--blue-light)}
.wnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px}
.wtitle{font-size:13px;font-weight:800;text-align:center;flex:1}
.warr{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:16px;flex-shrink:0}
.dblk{margin-bottom:14px}
.dhdr{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;padding:6px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.dhdr.today{color:var(--blue-light);border-bottom-color:rgba(59,130,246,0.4)}
.gcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;cursor:pointer}
.gcard:active{border-color:var(--blue-light)}
.scard{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.av-m{background:linear-gradient(135deg,#2563eb30,#1e40af40)}
.av-f{background:linear-gradient(135deg,#ec489930,#be185d40)}
.arow{display:flex;align-items:center;gap:12px;padding:14px;border-radius:14px;margin-bottom:8px;cursor:pointer;border:1px solid transparent;-webkit-user-select:none;user-select:none}
.arow.present{background:rgba(52,211,153,0.1);border-color:rgba(52,211,153,0.25)}
.arow.absent{background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.07)}
.achk{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;margin-right:auto}
.achk.present{background:rgba(52,211,153,0.25);border:2px solid var(--green);color:var(--green)}
.achk.absent{background:rgba(239,68,68,0.1);border:2px solid rgba(239,68,68,0.3);color:var(--red)}
.pbar{height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;margin-top:8px}
.pfill{height:100%;border-radius:3px}
.dots{display:flex;gap:3px;flex-wrap:wrap;margin-top:8px}
.dot{width:12px;height:12px;border-radius:3px}
.bbtn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0;margin-bottom:16px;display:flex;align-items:center;gap:4px}
.cpill{background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.3);border-radius:20px;padding:5px 14px;font-size:13px;font-weight:700;color:var(--green)}
.sitem{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer}
.sitem:active{border-color:var(--blue-light)}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:14px;font-weight:600;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.spin{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,0.2);border-top-color:white;border-radius:50%;animation:sp 0.7s linear infinite;vertical-align:middle;margin-left:8px}
@keyframes sp{to{transform:rotate(360deg)}}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.badge-w{background:rgba(239,68,68,0.2);color:var(--red)}
.badge-t{background:rgba(59,130,246,0.2);color:var(--blue-light);border-radius:6px;padding:1px 6px;font-size:10px;font-weight:700}
.admin-badge{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:white;border-radius:8px;padding:2px 8px;font-size:11px;font-weight:700}
.filter-row{display:flex;gap:8px;margin-bottom:12px}
.filter-btn{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:rgba(0,0,0,0.2);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer}
.filter-btn.active{background:rgba(59,130,246,0.2);border-color:rgba(59,130,246,0.5);color:var(--blue-light)}
.hours-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px}
.admin-section{background:rgba(124,58,237,0.08);border:1px solid rgba(124,58,237,0.2);border-radius:var(--radius);padding:16px;margin-bottom:12px}
@media(min-width:500px){
  .content,.content-login{max-width:480px;margin:0 auto}
  .bnav{max-width:480px;left:50%;transform:translateX(-50%);border-radius:20px 20px 0 0}
}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <span style="font-size:24px">⛵</span>
    <div>
      <div class="hdr-title">מרכז דניאל לחתירה</div><!-- v2.1 -->
      <div class="hdr-sub" id="hdr-sub">חוג שייט | עיריית תל אביב-יפו</div>
    </div>
    <div style="margin-right:auto;display:flex;align-items:center;gap:8px">
      <div id="hdr-avatar" style="display:none;cursor:pointer" onclick="nav('profile')" title="פרופיל">
        <div id="hdr-avatar-img" style="width:34px;height:34px;border-radius:50%;background:var(--border);border:2px solid rgba(255,255,255,0.2);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:16px">👤</div>
      </div>
      <button class="hdr-out" id="logout-btn" onclick="logout()" style="display:none">יציאה ↩</button>
    </div>
  </div>
  <div id="mc" class="content-login">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;color:var(--muted)">
      <div class="spin" style="width:36px;height:36px;border-width:3px"></div><p>טוען...</p>
    </div>
  </div>
  <nav class="bnav" id="bnav" style="display:none">
    <button class="nb active" id="nav-schedule" onclick="nav('schedule')"><span class="ic">📅</span>לוח</button>
    <button class="nb"        id="nav-hours"    onclick="nav('hours')">   <span class="ic">⏱️</span>שעות</button>
    <button class="nb"        id="nav-sailors"  onclick="nav('sailors')"> <span class="ic">👥</span>חניכים</button>
    <button class="nb"        id="nav-history"  onclick="nav('history')"> <span class="ic">📊</span>קבוצות</button>
  </nav>
</div>
<div class="toast" id="toast"></div>
<div id="sub-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:none;align-items:center;justify-content:center">
  <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;width:300px;max-width:90vw">
    <h3 style="font-weight:800;font-size:18px;margin-bottom:16px">🔄 בחר מדריך מחליף</h3>
    <div id="sub-list" style="max-height:250px;overflow-y:auto;margin-bottom:16px"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-g" style="flex:1" onclick="closeSubModal()">ביטול</button>
      <button class="btn btn-d btn-sm" id="sub-clear-btn" onclick="clearSubstitute()" style="display:none">הסר החלפה</button>
    </div>
  </div>
</div>
<script>
const SUPA_URL="https://ukmjspvhvughrdjexqwu.supabase.co";
const SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVrbWpzcHZodnVnaHJkamV4cXd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NTg0NjAsImV4cCI6MjA4ODAzNDQ2MH0.ZnMMPuN6qiC5eMO2c5-t00KX_HKu7ynLzrIaUB9C8dY";
// Admin IDs loaded from DB (coaches with is_admin=true)
let ADMIN_IDS=[];
const ADMIN_ID="__none__"; // legacy compat
const BOATS=["Optimist","RS Feva","RS Toura"];
const SIZES=["XS","S","M","L","XL","XXL"];
const COLORS=["#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6","#06b6d4","#ec4899"];
const DS=["א׳","ב׳","ג׳","ד׳","ה׳","ו׳","ש׳"];
const DL=["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];

function egf(){return{name:"",color:COLORS[0],days_of_week:[],start_time:"",end_time:"",start_date:"",coach_id:""};}
let A={
  coach:null,isAdmin:false,
  groups:[],sailors:[],sessions:[],attendance:{},
  allCoaches:[],allGroups:[],allSailors:[],allSessions:[],allAttendance:{},workHours:[],adminMonth:new Date().getMonth(),adminYear:new Date().getFullYear(),
  view:"schedule",subView:null,
  activeGroupId:null,activeSession:null,activeDate:null,
  form:ef(),editId:null,
  gf:egf(),editGId:null,
  weekOffset:0,monthOffset:0,scheduleFilter:"all",historyFilter:"all",hoursYear:null,hoursMonth:undefined,
  hForm:{date:td(),start_time:"",end_time:"",notes:""},editHId:null,
};
function ef(){return{first_name:"",last_name:"",birth_date:"",join_date:td(),shirt_size:"M",parent_name:"",parent_phone:"",gender:"male",boat:"Optimist"};}

// ── Supabase ──────────────────────────────────────────────────
async function sb(path,method="GET",body=null){
  const h={"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY,"Content-Type":"application/json","Prefer":method==="POST"?"return=representation":""};
  const opts={method,headers:h};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(SUPA_URL+"/rest/v1/"+path,opts);
  if(!res.ok){const e=await res.text();throw new Error(e);}
  const t=await res.text();return t?JSON.parse(t):null;
}
const dbG=(t,q="",o="created_at.asc")=>sb(t+"?"+q+(o?"&order="+o:""));
const dbP=(t,b)=>sb(t,"POST",b);
const dbPa=(t,q,b)=>sb(t+"?"+q,"PATCH",b);
const dbD=(t,q)=>sb(t+"?"+q,"DELETE");

// ── Helpers ───────────────────────────────────────────────────
function td(){return new Date().toISOString().split("T")[0];}
function addD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function toISO(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function fs(d){if(!d)return"";const dt=new Date(d+"T00:00:00");return String(dt.getDate()).padStart(2,"0")+"/"+String(dt.getMonth()+1).padStart(2,"0");}
function ff(d){if(!d)return"";const dt=new Date(d+"T00:00:00");return fs(d)+"/"+dt.getFullYear();}
function fl(d){
  if(!d)return"";
  const dt=new Date(d+"T00:00:00");
  const dayName=DL[dt.getDay()];
  const dateStr=new Intl.DateTimeFormat("he-IL",{year:"numeric",month:"long",day:"numeric"}).format(dt);
  return"יום "+dayName+", "+dateStr;
}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");}
function toast(msg,ms=2200){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),ms);}
function rc(r){if(r===null)return"#64748b";return r>=75?"#34d399":r>=50?"#fbbf24":"#f87171";}
function coachAvatar(coach, size=32){
  if(!coach)return "";
  const s=size+"px";
  const initials=(coach.name||"?")[0].toUpperCase();
  if(coach.avatar_url){
    return`<img src="${coach.avatar_url}" style="width:${s};height:${s};border-radius:50%;object-fit:cover;flex-shrink:0">`;
  }
  return`<div style="width:${s};height:${s};border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*0.45)}px;font-weight:700;flex-shrink:0">${initials}</div>`;
}
function getG(id){return A.groups.find(g=>g.id===id)||(A.allGroups&&A.allGroups.find(g=>g.id===id));}
function gSailors(gid){const g=getG(gid);if(!g)return[];return(g.sailorIds||[]).map(id=>A.sailors.find(s=>s.id===id)).filter(Boolean);}
function gSess(gid){return A.sessions.filter(s=>s.group_id===gid);}
function aRate(sailor,sessions){
  const jd=sailor.join_date||"2000-01-01";
  const rel=sessions.filter(s=>s.date>=jd&&!s.cancelled&&A.attendance[s.id]&&A.attendance[s.id][sailor.id]!==undefined);
  if(!rel.length)return null;
  return Math.round(rel.filter(s=>A.attendance[s.id][sailor.id]).length/rel.length*100);
}
function sloc(){try{return localStorage.getItem("sailing_last");}catch(e){return null;}}
function ssave(){try{localStorage.setItem("sailing_last",A.coach?.id||"");}catch(e){}}
function wkStart(off=0){const d=new Date();d.setDate(d.getDate()-d.getDay()+off*7);d.setHours(0,0,0,0);return d;}
function calcHours(s,e){
  if(!s||!e)return 0;
  const sp=s.split(":");const sh=+sp[0],sm=+sp[1];
  const ep=e.split(":");const eh=+ep[0],em=+ep[1];
  return Math.max(0,((eh*60+em)-(sh*60+sm))/60);
}
function fmtH(h){return h%1===0?h+"ש'":h.toFixed(1)+"ש'";}

// ── Load ──────────────────────────────────────────────────────
async function loadAll(){
  const cid=A.coach.id;
  // Load ALL groups so coach can fill attendance for any group
  const groups=await dbG("groups","","name.asc");
  const gids=groups.map(g=>g.id);
  let gsMap={};
  if(gids.length){
    const gs=await dbG("group_sailors",`group_id=in.(${gids.join(",")})`, "");
    gs.forEach(r=>{if(!gsMap[r.group_id])gsMap[r.group_id]=[];gsMap[r.group_id].push(r.sailor_id);});
  }
  A.groups=groups.map(g=>({...g,sailorIds:gsMap[g.id]||[],days_of_week:g.days_of_week||[]}));
  // Load ALL sailors globally so coaches can assign any sailor to their groups
  A.sailors=await dbG("sailors","","last_name.asc");
  A.sessions=gids.length?await dbG("sessions",`group_id=in.(${gids.join(",")})`):[]; 
  A.attendance={};
  const sids=A.sessions.map(s=>s.id);
  if(sids.length){
    const att=await dbG("attendance",`session_id=in.(${sids.join(",")})`, "");
    att.forEach(r=>{if(!A.attendance[r.session_id])A.attendance[r.session_id]={};A.attendance[r.session_id][r.sailor_id]=r.present;});
  }
  // work hours
  A.workHours=await dbG("work_hours",`coach_id=eq.${cid}`,"date.desc");
  A.cancellations={};
  A.sessions.forEach(s=>{if(s.cancelled)A.cancellations[s.id]=true;});
}

async function loadHours(){
  const cid=A.coach.id;
  A.workHours=await dbG("work_hours","coach_id=eq."+cid,"date.desc");
}
async function loadScheduleData(){
  A.allCoaches=await dbG("coaches","","name.asc");
  A.allGroups=(await dbG("groups","","name.asc")).map(g=>({...g,days_of_week:g.days_of_week||[]}));
  // Also refresh coach-specific data (sessions, attendance) if not admin
  if(A.coach&&!A.isAdmin)await loadAll();
}

async function loadAdminData(){
  A.allCoaches=await dbG("coaches","","name.asc");
  A.allGroups=(await dbG("groups","","name.asc")).map(g=>({...g,days_of_week:g.days_of_week||[]}));
  A.allSailors=await dbG("sailors","","last_name.asc");
  const _yr=A.adminYear||new Date().getFullYear();
  const _mn=A.adminMonth!==undefined?A.adminMonth:new Date().getMonth();
  const _mnStr=_yr+"-"+String(_mn+1).padStart(2,"0");
  A.allSessions=await dbG("sessions",`date=gte.${_mnStr}-01&date=lte.${_mnStr}-31`,"date.asc");
  // work hours all
  const wh=await dbG("work_hours","","date.desc");
  A.workHours=wh;
  A.cancellations={};
  A.allSessions.forEach(s=>{if(s.cancelled)A.cancellations[s.id]=true;});
  // attendance for all sessions
  const sids=A.allSessions.map(s=>s.id);
  A.allAttendance={};
  if(sids.length){
    // fetch in chunks to avoid URL limit
    for(let i=0;i<sids.length;i+=50){
      const chunk=sids.slice(i,i+50);
      const att=await dbG("attendance",`session_id=in.(${chunk.join(",")})`, "");
      att.forEach(r=>{if(!A.allAttendance[r.session_id])A.allAttendance[r.session_id]={};A.allAttendance[r.session_id][r.sailor_id]=r.present;});
    }
  }
  // group sailors map
  const gids=A.allGroups.map(g=>g.id);
  let gsMap={};
  if(gids.length){
    const gs=await dbG("group_sailors",`group_id=in.(${gids.join(",")})`, "");
    gs.forEach(r=>{if(!gsMap[r.group_id])gsMap[r.group_id]=[];gsMap[r.group_id].push(r.sailor_id);});
  }
  A.allGroups=A.allGroups.map(g=>({...g,sailorIds:gsMap[g.id]||[]}));
  // Alias so non-admin code paths work for admin too
  A.groups=A.allGroups;
  A.sailors=A.allSailors;
  A.sessions=A.allSessions;
  A.attendance=A.allAttendance||{};
}

async function openSession(date,gid){
  A.activeGroupId=gid;
  // Find the group — could be from allGroups if another coach's group
  const myG=getG(gid);
  const anyG=myG||A.allGroups.find(g=>g.id===gid);
  const sailorIds=anyG?.sailorIds||[];

  // Ensure the group is accessible in A.groups for session rendering
  if(!myG&&anyG){
    A.groups.push({...anyG,sailorIds:anyG.sailorIds||[]});
    const sids2=[...new Set([...A.sailors.map(s=>s.id),...sailorIds])];
    if(sailorIds.length){
      const newSailors=await dbG("sailors",`id=in.(${sailorIds.join(",")})`, "last_name.asc");
      newSailors.forEach(s=>{if(!A.sailors.find(x=>x.id===s.id))A.sailors.push(s);});
    }
  }

  const existing=(A.sessions||[]).find(s=>s.date===date&&s.group_id===gid)||(A.allSessions||[]).find(s=>s.date===date&&s.group_id===gid);
  if(existing){
    A.activeSession={...existing};
    if(!A.attendance[existing.id])A.attendance[existing.id]={};
    for(const sid of sailorIds){
      if(A.attendance[existing.id][sid]===undefined){
        A.attendance[existing.id][sid]=false;
        try{await dbP("attendance",{session_id:existing.id,sailor_id:sid,present:false});}catch(e){}
      }
    }
  }else{
    try{
      const sess=(await dbP("sessions",{group_id:gid,date}))[0];
      A.sessions.push(sess);A.activeSession={...sess};A.attendance[sess.id]={};
      for(const sid of sailorIds){
        await dbP("attendance",{session_id:sess.id,sailor_id:sid,present:false});
        A.attendance[sess.id][sid]=false;
      }
    }catch(e){toast("❌ "+e.message);return;}
  }
  A.subView="session";renderPage();
}

async function cancelSession(reason){
  const sess=A.activeSession;if(!sess)return;
  const cancelled=!sess.cancelled;
  try{
    await dbPa("sessions",`id=eq.${sess.id}`,{cancelled,cancel_reason:cancelled?(reason||null):null});
    const s=A.sessions.find(x=>x.id===sess.id);
    if(s){s.cancelled=cancelled;s.cancel_reason=reason||null;}
    A.activeSession={...A.activeSession,cancelled,cancel_reason:reason||null};
    if(cancelled)A.cancellations[sess.id]=true;else delete A.cancellations[sess.id];
    // If cancelled - clear work hours for this date
    if(cancelled){
      const g=getG(sess.group_id);
      const hr=A.workHours.find(h=>h.date===sess.date&&h.coach_id===A.coach?.id);
      if(hr){
        await dbPa("work_hours",`id=eq.${hr.id}`,{start_time:null,end_time:null,notes:"דחייה אוטומטית"});
        hr.start_time=null;hr.end_time=null;
      }
    }
    if(cancelled){goBack();}
    renderPage();toast(cancelled?"⚠️ פעילות סומנה כדחויה — שעות נמחקו":"✅ דחייה בוטלה");
  }catch(e){toast("❌ "+e.message);}
}

  const reason=prompt("סיבת דחייה (אופציונלי):");
  if(reason===null)return;
  cancelSession(reason);
}

async function quickCancel(date,gid){
  var sess=A.sessions.find(function(s){return s.date===date&&s.group_id===gid;});
  if(!sess){
    var g=getG(gid);if(!g)return;
    try{
      var res=(await dbP("sessions",{group_id:gid,date:date,created_by:A.coach.id}))[0];
      sess=res;A.sessions.push(sess);
      if(A.allSessions)A.allSessions.push(sess);
      A.attendance[sess.id]={};
    }catch(e){toast("❌ "+e.message);return;}
  }
  if(sess.cancelled){
    try{
      await dbPa("sessions","id=eq."+sess.id,{cancelled:false,cancel_reason:null});
      sess.cancelled=false;sess.cancel_reason=null;
      delete A.cancellations[sess.id];
      renderPage();toast("✅ דחייה בוטלה");
    }catch(e){toast("❌ "+e.message);}
    return;
  }
  var reason=prompt("סיבת דחייה (אופציונלי):");
  if(reason===null)return;
  try{
    await dbPa("sessions","id=eq."+sess.id,{cancelled:true,cancel_reason:reason||null});
    sess.cancelled=true;sess.cancel_reason=reason||null;
    A.cancellations[sess.id]=true;
    renderPage();toast("⚠️ פעילות סומנה כדחויה");
  }catch(e){toast("❌ "+e.message);}
}
function showDayMenu(date,evt){
  document.getElementById("day-menu")&&document.getElementById("day-menu").remove();
  var groups=(A.allGroups&&A.allGroups.length?A.allGroups:A.groups)||[];
  var dow=new Date(date+"T00:00:00").getDay();
  var items=groups.filter(function(g){return(g.days_of_week||[]).indexOf(dow)>=0&&(!g.start_date||date>=g.start_date);});
  if(!items.length){toast("אין קבוצות ביום זה");return;}
  var menu=document.createElement("div");
  menu.id="day-menu";
  menu.style.cssText="position:fixed;z-index:500;background:#0d2444;border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:8px;min-width:200px;box-shadow:0 8px 32px rgba(0,0,0,0.6)";
  var r=evt.target.getBoundingClientRect();
  menu.style.top=(r.bottom+6)+"px";
  menu.style.left=Math.max(8,r.left-80)+"px";
  var title=document.createElement("div");
  title.style.cssText="font-size:11px;font-weight:800;color:var(--muted);padding:4px 8px 8px";
  title.textContent="⚠️ סמן כדחוי — "+date;
  menu.appendChild(title);
  items.forEach(function(g){
    var s=A.sessions.find(function(x){return x.date===date&&x.group_id===g.id;});
    var canc=s&&s.cancelled;
    var row=document.createElement("div");
    row.style.cssText="padding:9px 10px;cursor:pointer;border-radius:8px;font-size:13px;color:"+(canc?"#f59e0b":"var(--text)")+";font-weight:"+(canc?"700":"400");
    row.textContent=(canc?"✓ ":"")+g.name;
    row.onmouseover=function(){this.style.background="rgba(255,255,255,0.07)";};
    row.onmouseout=function(){this.style.background="";};
    row.onclick=function(){menu.remove();quickCancel(date,g.id);};
    menu.appendChild(row);
  });
  document.body.appendChild(menu);
  setTimeout(function(){document.addEventListener("click",function h(){menu.remove();document.removeEventListener("click",h);});},100);
}
async function toggleAll(){
  const sess=A.activeSession;if(!sess)return;
  const att=A.attendance[sess.id]||{};const ids=Object.keys(att);
  const next=!ids.every(id=>att[id]);
  ids.forEach(id=>{A.attendance[sess.id][id]=next;});renderPage();
  try{for(const sid of ids)await dbPa("attendance",`session_id=eq.${sess.id}&sailor_id=eq.${sid}`,{present:next});}
  catch(e){toast("❌ שגיאה");}
}

// ── Work hours ────────────────────────────────────────────────
async function saveHours(){
  const f=A.hForm;
  if(!f.date||!f.start_time||!f.end_time){toast("⚠️ נא למלא תאריך ושעות");return;}
  if(f.start_time>=f.end_time){toast("⚠️ שעת יציאה חייבת להיות אחרי כניסה");return;}
  try{
    if(A.editHId){
      await dbPa("work_hours",`id=eq.${A.editHId}`,{date:f.date,start_time:f.start_time,end_time:f.end_time,notes:f.notes||null});
      const i=A.workHours.findIndex(h=>h.id===A.editHId);
      if(i>=0)A.workHours[i]={...A.workHours[i],...f};
      toast("✅ עודכן");
    }else{
      const res=(await dbP("work_hours",{coach_id:A.coach.id,date:f.date,start_time:f.start_time,end_time:f.end_time,notes:f.notes||null}))[0];
      A.workHours.unshift(res);toast("✅ נשמר!");
    }
    A.editHId=null;A.hForm={date:td(),start_time:"",end_time:"",notes:""};A.subView=null;renderPage();
  }catch(e){toast("❌ "+e.message);}
}
async function delHours(id){
  if(!confirm("למחוק רשומה זו?"))return;
  try{
    await dbD("work_hours",`id=eq.${id}`);
    A.workHours=A.workHours.filter(h=>h.id!==id);renderPage();
  }catch(e){toast("❌ "+e.message);}
}
function editHours(id){
  const h=A.workHours.find(x=>x.id===id);if(!h)return;
  A.hForm={date:h.date,start_time:h.start_time,end_time:h.end_time,notes:h.notes||""};
  A.editHId=id;A.subView="editHours";renderPage();
}

// ── Export ────────────────────────────────────────────────────
function toCSV(rows){return rows.map(r=>r.map(c=>{const s=String(c??"");return(s.includes(",")||s.includes('"')||s.includes("\n"))?`"${s.replace(/"/g,'""')}"`:s;}).join(",")).join("\n");}
function dlCSV(content,name){const blob=new Blob(["\uFEFF"+content],{type:"text/csv;charset=utf-8;"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click();}
function exportGroup(gid){
  const g=getG(gid);if(!g)return;
  const sess=gSess(gid).sort((a,b)=>a.date.localeCompare(b.date));
  const sailors=gSailors(gid);
  const rows=[["שם מלא","סירה","הצטרפות",...sess.map(s=>fs(s.date)),"%"],...sailors.map(s=>{
    const jd=s.join_date||"2000-01-01";
    const rel=sess.filter(x=>x.date>=jd);
    const marks=sess.map(x=>{if(x.date<jd)return"—";return(A.attendance[x.id]||{})[s.id]?"✓":"✗";});
    const pct=rel.length?Math.round(rel.filter(x=>(A.attendance[x.id]||{})[s.id]).length/rel.length*100)+"%":"—";
    return[s.first_name+" "+s.last_name,s.boat,s.join_date||"",...marks,pct];
  })];
  dlCSV(toCSV(rows),`${g.name}_${td()}.csv`);toast("📥 הורד!");
}
function exportHours(){
  const rows=[["תאריך","כניסה","יציאה","שעות","הערות"],...A.workHours.map(h=>[h.date,h.start_time,h.end_time,calcHours(h.start_time,h.end_time).toFixed(1),h.notes||""])];
  dlCSV(toCSV(rows),`שעות_${A.coach?.name||""}_${td()}.csv`);toast("📥 הורד!");
}
function exportAllHours(){
  const rows=[["מדריך","תאריך","כניסה","יציאה","שעות","הערות"]];
  A.allCoaches.forEach(c=>{
    A.workHours.filter(h=>h.coach_id===c.id).sort((a,b)=>a.date.localeCompare(b.date))
      .forEach(h=>rows.push([c.name,h.date,h.start_time,h.end_time,calcHours(h.start_time,h.end_time).toFixed(1),h.notes||""]));
  });
  dlCSV(toCSV(rows),`שעות_כל_המדריכים_${td()}.csv`);toast("📥 הורד!");
}
function exportCancellations(){
  const rows=[["מדריך","קבוצה","תאריך","סיבה"]];
  A.allSessions.filter(s=>s.cancelled).sort((a,b)=>b.date.localeCompare(a.date)).forEach(s=>{
    const g=A.allGroups.find(x=>x.id===s.group_id);
    const c=A.allCoaches.find(x=>x.id===g?.coach_id);
    rows.push([c?.name||"",g?.name||"",s.date,s.cancel_reason||""]);
  });
  dlCSV(toCSV(rows),`דחיות_${td()}.csv`);toast("📥 הורד!");
}

// ── Schedule ──────────────────────────────────────────────────
function rSchedule(isAdmin=false){
  // view mode: week / day / month
  const vm=A.scheduleView||"week";
  const off=A.weekOffset;
  const ws=wkStart(off);
  // For month view, use monthOffset to determine which month to show
  const moff=A.monthOffset||0;
  const now2=new Date();
  const mViewDate=new Date(now2.getFullYear(), now2.getMonth()+moff, 1);
  const days=vm==="month"
    ? Array.from({length:7},(_,i)=>addD(mViewDate,i))
    : Array.from({length:7},(_,i)=>addD(ws,i));
  const todayStr=td();

  const map={};days.forEach(d=>{map[toISO(d)]=[];});
  (A.allGroups&&A.allGroups.length?A.allGroups:A.groups).forEach(g=>{
    const coach=(A.allCoaches||[]).find(c=>c.id===g.coach_id);
    const isMe=g.coach_id===A.coach?.id;
    (g.days_of_week||[]).forEach(dow=>{
      const dayD=days.find(d=>d.getDay()===dow);
      if(dayD){
        const ds=toISO(dayD);
        if(map[ds]&&(!g.start_date||ds>=g.start_date))map[ds].push({g,coach,isMe});
      }
    });
  });
  // sort each day by start_time
  Object.keys(map).forEach(ds=>{map[ds].sort((a,b)=>(a.g.start_time||"99:99").localeCompare(b.g.start_time||"99:99"));});

  const navStr=isAdmin?"admin-schedule":"schedule";
  const filterHtml=`
    <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
      <button class="filter-btn ${vm==="day"?"active":""}" onclick="A.scheduleView='day';nav('${navStr}')">יום</button>
      <button class="filter-btn ${vm==="week"?"active":""}" onclick="A.scheduleView='week';nav('${navStr}')">שבוע</button>
      <button class="filter-btn ${vm==="month"?"active":""}" onclick="A.scheduleView='month';nav('${navStr}')">חודש</button>
      ${!isAdmin?`<span style="flex:1"></span>
      <button class="filter-btn ${A.scheduleFilter==="all"?"active":""}" onclick="A.scheduleFilter='all';renderPage()">📅 הכל</button>
      <button class="filter-btn ${A.scheduleFilter==="mine"?"active":""}" onclick="A.scheduleFilter='mine';renderPage()">⭐ שלי</button>`:""}
    </div>`;

  // compute viewDays and titleStr
  let viewDays, titleStr, monthCalHTML="";
  if(vm==="day"){
    viewDays=[days[Math.floor(days.length/2)]];
    titleStr=fl(toISO(viewDays[0]));
  } else if(vm==="month"){
    const myr=mViewDate.getFullYear(), mmn=mViewDate.getMonth();
    const dim=new Date(myr,mmn+1,0).getDate();
    const mName=new Intl.DateTimeFormat("he-IL",{month:"long",year:"numeric"}).format(new Date(myr,mmn,1));
    titleStr=mName;
    // build calendar grid
    const firstDow=new Date(myr,mmn,1).getDay(); // 0=sun
    // build full month map
    const mmap={};
    for(let d2=1;d2<=dim;d2++){
      const ds=myr+"-"+String(mmn+1).padStart(2,"0")+"-"+String(d2).padStart(2,"0");
      mmap[ds]=[];
    }
    (A.allGroups&&A.allGroups.length?A.allGroups:A.groups).forEach(g=>{
      const coach=A.allCoaches.find(c=>c.id===g.coach_id);
      const isMe=g.coach_id===A.coach?.id;
      (g.days_of_week||[]).forEach(dow=>{
        for(let d2=1;d2<=dim;d2++){
          const dt=new Date(myr,mmn,d2);
          const ds=toISO(dt);
          if(dt.getDay()===dow&&(!g.start_date||ds>=g.start_date)){
            if(!A.scheduleFilter||A.scheduleFilter==="all"||isMe||isAdmin)mmap[ds].push({g,coach,isMe});
          }
        }
      });
    });
    // day headers
    const dayHdrs=["א","ב","ג","ד","ה","ו","ש"];
    let cells="";
    // empty cells before first
    for(let i=0;i<firstDow;i++)cells+=`<div></div>`;
    for(let d2=1;d2<=dim;d2++){
      const ds=myr+"-"+String(mmn+1).padStart(2,"0")+"-"+String(d2).padStart(2,"0");
      const isToday=ds===todayStr;
      let items=mmap[ds]||[];
      if(!isAdmin&&A.scheduleFilter==="mine")items=items.filter(x=>x.isMe);
      items.sort((a,b)=>(a.g.start_time||"99:99").localeCompare(b.g.start_time||"99:99"));
      cells+=`<div style="min-height:60px;border:1px solid var(--border);border-radius:8px;padding:4px;background:${isToday?"rgba(59,130,246,0.08)":"var(--card)"}">
        <div style="font-size:11px;font-weight:${isToday?"800":"600"};color:${isToday?"var(--blue-light)":"var(--muted)"};margin-bottom:2px">${d2}</div>
        ${items.map(({g,coach,isMe})=>`<div onclick="A.activeGroupId='${g.id}';A.activeDate='${ds}';A.subView='groupDetail';renderPage()" style="background:${g.color}22;border-right:2px solid ${g.color};border-radius:4px;padding:2px 4px;margin-bottom:2px;cursor:pointer;${isMe||isAdmin?"":"opacity:0.5"}">
          <div style="font-size:9px;font-weight:700;color:${g.color};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(g.name)}</div>
          ${g.start_time?`<div style="font-size:8px;color:var(--muted)">${g.start_time}</div>`:""}
        </div>`).join("")}
      </div>`;
    }
    monthCalHTML=`
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px">
        ${dayHdrs.map(h=>`<div style="text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:4px 0">${h}</div>`).join("")}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">
        ${cells}
      </div>`;
    viewDays=[];
  } else {
    viewDays=days;
    titleStr=ff(toISO(days[0]))+" – "+ff(toISO(days[6]));
  }
  return`
    <h2 style="font-size:20px;font-weight:800;margin-bottom:10px">📅 לוח</h2>
    ${filterHtml}
    <div class="wnav">
      <button class="warr" onclick="A.scheduleView==='month'?(A.monthOffset--,renderPage()):A.weekOffset--;nav('${navStr}')">&#8594;</button>
      <div class="wtitle">${titleStr}</div>
      <button class="warr" onclick="A.scheduleView==='month'?(A.monthOffset++,renderPage()):A.weekOffset++;nav('${navStr}')">&#8592;</button>
    </div>
    ${(A.scheduleView==="month"?moff!==0:off!==0)?`<button class="btn btn-g btn-sm" style="margin-bottom:12px" onclick="A.scheduleView==='month'?(A.monthOffset=0,renderPage()):(A.weekOffset=0,nav('${navStr}'))">↩ היום</button>`:""}
    ${vm==="month"?monthCalHTML:""}
    ${viewDays.map(d=>{
      const ds=toISO(d);
      let items=map[ds]||[];
      if(!isAdmin&&A.scheduleFilter==="mine")items=items.filter(x=>x.isMe);
      const isToday=ds===todayStr;
      const dow=d.getDay();
      return`<div class="dblk">
        <div class="dhdr ${isToday?"today":""}">
          <span>${DL[dow]} ${ff(ds)}</span>
          <span style="display:flex;gap:6px;align-items:center">
            ${isToday?`<span class="badge-t">היום</span>`:""}
            <button onclick="event.stopPropagation();A.gf=egf();A.gf.days_of_week=[${dow}];A.gf.start_date='${ds}';A.subView='addGroup';renderPage()" style="background:rgba(59,130,246,0.2);border:1px solid rgba(59,130,246,0.3);color:var(--blue-light);border-radius:6px;padding:2px 8px;font-size:12px;cursor:pointer">+ קבוצה</button>
          </span>
        </div>
        ${items.length===0?`<div style="font-size:12px;color:var(--muted);padding:6px 0 2px;padding-right:4px">אין פעילות</div>`
        :items.map(({g,coach,isMe})=>`
          <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;border-right:3px solid ${g.color};${isMe||isAdmin?"":"opacity:0.55"}overflow:hidden">
            ${(function(){var _s=A.sessions.find(function(x){return x.date===ds&&x.group_id===g.id;});return (_s&&_s.cancelled?'<div style="background:rgba(245,158,11,0.1);padding:4px 12px;font-size:11px;font-weight:700;color:#f59e0b;border-bottom:1px solid rgba(245,158,11,0.2)">'+"⚠️ דחוי"+(_s.cancel_reason?" · "+esc(_s.cancel_reason):"")+'</div>':"") + (_s&&_s.substitute_coach_id?(function(){var _sub=(A.allCoaches||[]).find(function(x){return x.id===_s.substitute_coach_id;});return '<div style="background:rgba(167,139,250,0.1);padding:4px 12px;font-size:11px;font-weight:700;color:#a78bfa;border-bottom:1px solid rgba(167,139,250,0.2)">🔄 מחליף: '+esc(_sub?_sub.name:"")+'</div>';})():"")})()}
            <div style="display:flex;align-items:center;gap:10px;padding:10px 12px">
              <div style="width:8px;height:8px;border-radius:50%;background:${g.color};flex-shrink:0"></div>
              <div style="flex:1;min-width:0">
                <div style="font-weight:700;font-size:13px">${esc(g.name)}${isMe?` <span style="font-size:10px;color:var(--green);font-weight:700">● שלי</span>`:""}</div>
                <div style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px">${coach?.avatar_url?`<img src="${coach.avatar_url}" style="width:14px;height:14px;border-radius:50%;object-fit:cover">`:""}<span>${esc(coach?.name||"")}${g.start_time?" · ⏰ "+g.start_time+(g.end_time?"–"+g.end_time:""):""}</span></div>
              </div>
              
            </div>
            <div style="display:flex;border-top:1px solid var(--border)">
              <button style="flex:1;padding:9px 4px;background:none;border:none;border-left:1px solid var(--border);color:var(--green);font-size:12px;font-weight:700;cursor:pointer" onclick="openSession('${ds}','${g.id}')" ${(function(){var _sx=A.sessions.find(x=>x.date===ds&&x.group_id===g.id);return _sx&&_sx.cancelled?"disabled style='opacity:0.35;cursor:not-allowed;pointer-events:none'":""})()}>✅ נוכחות</button>
              <button style="flex:1;padding:9px 4px;background:none;border:none;border-left:1px solid var(--border);color:#f59e0b;font-size:12px;font-weight:700;cursor:pointer" onclick="quickCancel('${ds}','${g.id}')">⚠️ דחייה</button>
              <button style="flex:1;padding:9px 4px;background:none;border:none;border-left:1px solid var(--border);color:#a78bfa;font-size:12px;font-weight:700;cursor:pointer" onclick="substituteSession('${ds}','${g.id}')">🔄 החלפה</button>
              <button style="flex:1;padding:9px 4px;background:none;border:none;border-left:1px solid var(--border);color:var(--blue-light);font-size:12px;font-weight:700;cursor:pointer" onclick="A.activeGroupId='${g.id}';A.activeDate='${ds}';A.subView='assignSailors';renderPage()">👥 הוסף/הסר חניך</button>
              <button style="flex:1;padding:9px 4px;background:none;border:none;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer" onclick="A.activeGroupId='${g.id}';A.activeDate='${ds}';A.subView='groupDetail';renderPage()">📋 פרטי קבוצה</button>
            </div>
          </div>`).join("")}
      </div>`;
    }).join("")}
  `;
}

// ── Hours (coach) ─────────────────────────────────────────────
function rHours(){
  const now=new Date();
  const yr=A.hoursYear||now.getFullYear();
  const mn=A.hoursMonth!==undefined?A.hoursMonth:now.getMonth();
  const todayStr=td();
  
  // month nav
  const daysInMonth=new Date(yr,mn+1,0).getDate();
  const mName=new Intl.DateTimeFormat("he-IL",{month:"long",year:"numeric"}).format(new Date(yr,mn,1));
  
  // total for month
  const monthTotal=A.workHours.filter(h=>h.date.startsWith(yr+"-"+String(mn+1).padStart(2,"0")))
    .reduce((s,h)=>s+calcHours(h.start_time,h.end_time),0);
  const grandTotal=A.workHours.reduce((s,h)=>s+calcHours(h.start_time,h.end_time),0);

  // build day rows
  let rows="";
  for(let day=1;day<=daysInMonth;day++){
    const dateStr=yr+"-"+String(mn+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
    const dow=new Date(dateStr+"T00:00:00").getDay();
    const isToday=dateStr===todayStr;
    const isFuture=dateStr>todayStr;
    const rec=A.workHours.find(h=>h.date===dateStr);
    const hid="hr-"+dateStr;
    
    rows+=`<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);">
      <div style="min-width:52px;text-align:right">
        <div style="font-size:15px;font-weight:${isToday?"800":"600"};color:${isToday?"var(--blue-light)":"var(--text)"}">${String(day).padStart(2,"0")}</div>
        <div style="font-size:10px;color:var(--muted)">${DL[dow]}</div>
        ${isToday?`<div style="font-size:9px;color:var(--blue-light);font-weight:700">היום</div>`:""}
      </div>
      <div style="flex:1;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <input type="time" style="background:rgba(0,0,0,0.3);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:8px;font-size:14px;width:90px;color-scheme:dark;" 
          value="${rec?rec.start_time:""}" 
          placeholder="כניסה"
          onchange="autoSaveHours('${dateStr}','start_time',this.value)"

function prevMonth(){
  const now=new Date();
  let yr=A.hoursYear||now.getFullYear();
  let mn=A.hoursMonth!==undefined?A.hoursMonth:now.getMonth();
  mn--;if(mn<0){mn=11;yr--;}
  A.hoursYear=yr;A.hoursMonth=mn;renderPage();
}
function nextMonth(){
  const now=new Date();
  let yr=A.hoursYear||now.getFullYear();
  let mn=A.hoursMonth!==undefined?A.hoursMonth:now.getMonth();
  mn++;if(mn>11){mn=0;yr++;}
  A.hoursYear=yr;A.hoursMonth=mn;renderPage();
}

// pending save timers per date
const _hTimers={};
function autoSaveHours(date,field,value){
  let rec=A.workHours.find(h=>h.date===date);
  if(!rec){rec={id:null,coach_id:A.coach.id,date,start_time:"",end_time:"",notes:""};A.workHours.push(rec);}
  rec[field]=value;
  // update hours span inline
  if(rec.start_time&&rec.end_time){
    const h=calcHours(rec.start_time,rec.end_time);
    const st=document.getElementById("st-"+date);
    if(st){const span=st.parentElement.querySelector("span[style*='min-width:32px']");if(span){span.textContent=h>0?fmtH(h):"";span.style.color="var(--green)";}}
  }
  // update month total and grand total inline
  const mKey=date.substr(0,7);
  const mTotal=A.workHours.filter(h=>h.date.startsWith(mKey)).reduce((s,h)=>s+calcHours(h.start_time,h.end_time),0);
  const gTotal=A.workHours.reduce((s,h)=>s+calcHours(h.start_time,h.end_time),0);
  const mEl=document.getElementById("month-total");if(mEl)mEl.textContent=fmtH(mTotal)+" החודש";
  const gEl=document.getElementById("grand-total");if(gEl)gEl.textContent=fmtH(gTotal);
  clearTimeout(_hTimers[date]);
  _hTimers[date]=setTimeout(()=>persistHours(date),800);
  // Show/hide copy button immediately
  const cpyEl=document.getElementById("cpybtn-"+date);
  if(cpyEl){
    if(rec.start_time&&rec.end_time){
      cpyEl.innerHTML=`<button onclick="showCopyModal('${date}')" style="background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);color:var(--blue-light);border-radius:8px;padding:6px 8px;font-size:12px;cursor:pointer;white-space:nowrap">📋</button>`;
    }else{
      cpyEl.innerHTML="";
    }
  }
}

async function clearHours(date){
  if(!confirm("לנקות את השעות ליום זה?"))return;
  const rec=A.workHours.find(h=>h.date===date);
  if(!rec)return;
  try{
    if(rec.id){await dbD("work_hours","id=eq."+rec.id);rec.id=null;}
    rec.start_time="";rec.end_time="";rec.notes="";
    const st=document.getElementById("st-"+date);
    const et=document.getElementById("et-"+date);
    const nt=document.getElementById("nt-"+date);
    if(st)st.value="";if(et)et.value="";if(nt)nt.value="";
    const sp=document.getElementById("sv-"+date);if(sp)sp.textContent="";
    const cpyEl=document.getElementById("cpybtn-"+date);if(cpyEl)cpyEl.innerHTML="";
    // update totals
    autoSaveHours(date,"start_time","");
    toast("🗑️ שעות נוקו");
  }catch(e){toast("❌ "+e.message);}
}
async function persistHours(date){
  const rec=A.workHours.find(h=>h.date===date);
  if(!rec)return;
  if(!rec.start_time&&!rec.end_time&&!rec.notes)return;
  try{
    if(rec.id){
      await dbPa("work_hours",`id=eq.${rec.id}`,{start_time:rec.start_time||null,end_time:rec.end_time||null,notes:rec.notes||null});
    }else{
      const res=(await dbP("work_hours",{coach_id:A.coach.id,date,start_time:rec.start_time||null,end_time:rec.end_time||null,notes:rec.notes||null}))[0];
      rec.id=res.id;
    }
    var st2=document.getElementById("st-"+date);
    if(st2){var el2=st2.parentElement;if(el2){el2.style.background="rgba(52,211,153,0.08)";setTimeout(function(){if(el2)el2.style.background="";},1500);}}
    var savedEl=document.getElementById("sv-"+date);
    if(savedEl){savedEl.textContent="✓ נשמר";savedEl.style.opacity="1";setTimeout(function(){if(savedEl)savedEl.style.opacity="0";},2000);}
  }catch(e){toast("❌ שגיאת שמירה: "+e.message);}
}

function showCopyModal(date){
  // find same weekday in rest of month
  const src=A.workHours.find(h=>h.date===date);
  if(!src||!src.start_time||!src.end_time){toast("⚠️ נא למלא שעות קודם");return;}
  const d=new Date(date+"T00:00:00");
  const dow=d.getDay();
  const yr=d.getFullYear(),mn=d.getMonth();
  const dim=new Date(yr,mn+1,0).getDate();
  const candidates=[];
  for(let day=1;day<=dim;day++){
    const cd=new Date(yr,mn,day);
    const ds=toISO(cd);
    if(ds>date&&cd.getDay()===dow)candidates.push(ds);
  }
  if(!candidates.length){toast("אין ימים זהים נוספים בחודש");return;}
  A.copySource=date;A.copyCandidates=candidates;A.copySelected=new Set();
  // show modal
  const modal=document.createElement("div");
  modal.id="copy-modal";
  modal.style="position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:300;display:flex;align-items:flex-end;justify-content:center";
  modal.innerHTML=`<div style="background:#0d2444;border:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:70vh;overflow-y:auto">
    <div style="font-size:16px;font-weight:800;margin-bottom:4px">📋 שכפול שעות</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px">${src.start_time}–${src.end_time} · בחר ימים לשכפול</div>
    ${candidates.map(ds=>`<div style="display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:10px;margin-bottom:6px;cursor:pointer" id="cday-${ds}" onclick="toggleCopyDay('${ds}')">
      <div style="width:22px;height:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px" id="cchk-${ds}"></div>
      <span style="font-size:14px;font-weight:600">${fl(ds)}</span>
    </div>`).join("")}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px">
      <button class="btn btn-g" onclick="document.getElementById('copy-modal').remove()">ביטול</button>
      <button class="btn btn-p" onclick="applyCopyHours()">✅ שכפל</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
}
function toggleCopyDay(ds){
  if(A.copySelected.has(ds))A.copySelected.delete(ds);else A.copySelected.add(ds);
  const el=document.getElementById("cday-"+ds);
  const chk=document.getElementById("cchk-"+ds);
  if(el)el.style.borderColor=A.copySelected.has(ds)?"rgba(59,130,246,0.5)":"var(--border)";
  if(chk)chk.textContent=A.copySelected.has(ds)?"✓":"";
}
async function applyCopyHours(){
  const src=A.workHours.find(h=>h.date===A.copySource);
  if(!src)return;
  document.getElementById("copy-modal")?.remove();
  let count=0;
  for(const ds of A.copySelected){
    let rec=A.workHours.find(h=>h.date===ds);
    if(!rec){rec={id:null,coach_id:A.coach.id,date:ds,start_time:src.start_time,end_time:src.end_time,notes:src.notes||""};A.workHours.push(rec);}
    else{rec.start_time=src.start_time;rec.end_time=src.end_time;}
    try{
      if(rec.id){await dbPa("work_hours",`id=eq.${rec.id}`,{start_time:rec.start_time,end_time:rec.end_time});}
      else{const res=(await dbP("work_hours",{coach_id:A.coach.id,date:ds,start_time:src.start_time,end_time:src.end_time,notes:src.notes||null}))[0];rec.id=res.id;}
      count++;
    }catch(e){}
  }
  renderPage();toast(`✅ שוכפל ל-${count} ימים`);
}

  return`<h2 style="font-size:20px;font-weight:800;margin-bottom:12px">📊 קבוצות</h2>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button class="filter-btn ${A.historyFilter==='all'?'active':''}" onclick="A.historyFilter='all';renderPage()">🌐 הכל</button>
      <button class="filter-btn ${A.historyFilter==='mine'?'active':''}" onclick="A.historyFilter='mine';renderPage()">⭐ שלי</button>
    </div>
    ${cb}
    ${(A.historyFilter==='mine'?(A.allGroups||A.groups).filter(g=>g.coach_id===A.coach?.id):(A.allGroups&&A.allGroups.length?A.allGroups:A.groups)).map(g=>{
      const sess=gSess(g.id).sort((a,b)=>a.date.localeCompare(b.date));
      const sailors=gSailors(g.id);
      if(!sess.length&&!sailors.length)return"";
      return`<div class="card" style="border-right:3px solid ${g.color}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div style="font-weight:800;font-size:15px">${esc(g.name)}</div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-ex btn-sm" onclick="exportGroup('${g.id}')">📥</button>
            <button class="btn btn-sh btn-sm" onclick="exportGroup('${g.id}');setTimeout(()=>window.open('https://sheets.new','_blank'),400)">📊</button>
          </div>
        </div>
        ${sailors.length===0?`<p style="color:var(--muted);font-size:12px">אין חניכים</p>`
        :sailors.map(s=>{
          const r=aRate(s,sess);const col=rc(r);
          const jd=s.join_date||"2000-01-01";
          const rel=sess.filter(x=>x.date>=jd);
          const att=rel.filter(x=>(A.attendance[x.id]||{})[s.id]).length;
          const missed=rel.length-att;
          const dots=sess.slice(-12).map(x=>{
            if(x.date<jd)return`<div class="dot" style="background:#1e3a5f"></div>`;
            const p=(A.attendance[x.id]||{})[s.id];
            return`<div class="dot" style="background:${p?"#34d399":"#ef4444"};opacity:${p?0.8:0.4}"></div>`;
          }).join("");
          return`<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div><span style="font-weight:700;font-size:13px">${esc(s.first_name)} ${esc(s.last_name)}</span>
              ${missed>=3?`<span class="badge badge-w" style="margin-right:6px">⚠️ ${missed}</span>`:""}</div>
              <div><span style="font-size:17px;font-weight:800;color:${col}">${r!==null?r+"%":"—"}</span><span style="font-size:10px;color:var(--muted);margin-right:4px">${att}/${rel.length}</span></div>
            </div>
            <div class="pbar"><div class="pfill" style="width:${r||0}%;background:${col}"></div></div>
            <div class="dots">${dots}</div>
          </div>`;
        }).join("")}
      </div>`;
    }).join("")}`;
}

// ── ADMIN VIEWS ───────────────────────────────────────────────

function rAdminMonthly(){
  const now=new Date();
  const yr=A.adminYear||now.getFullYear();
  const mn=A.adminMonth!==undefined?A.adminMonth:now.getMonth();
  const mName=new Intl.DateTimeFormat("he-IL",{month:"long",year:"numeric"}).format(new Date(yr,mn,1));
  const dim=new Date(yr,mn+1,0).getDate();
  const mnStr=String(mn+1).padStart(2,"0");
  const todayStr=td();

  const sessMap={};
  A.allSessions.forEach(s=>{if(!sessMap[s.date])sessMap[s.date]=[];sessMap[s.date].push(s);});

  const monthSess=A.allSessions.filter(s=>!s.cancelled);
  const monthCanc=A.allSessions.filter(s=>s.cancelled);

  // Build agenda rows - one per day that has scheduled groups
  let rows="";
  for(let day=1;day<=dim;day++){
    const dateStr=yr+"-"+mnStr+"-"+String(day).padStart(2,"0");
    const dow=new Date(dateStr+"T00:00:00").getDay();
    const scheduledGroups=A.allGroups.filter(g=>(g.days_of_week||[]).includes(dow));
    if(!scheduledGroups.length)continue;

    const isToday=dateStr===todayStr;
    const isPast=dateStr<todayStr;
    const dbSess=sessMap[dateStr]||[];
    const dayName="יום "+DL[dow];
    const dateLabel=String(day).padStart(2,"0")+"/"+mnStr;

    const groupCards=scheduledGroups.map(g=>{
      const sess=dbSess.find(s=>s.group_id===g.id);
      const isCancelled=sess?.cancelled;
      const subCoach=sess?.substitute_coach_id?A.allCoaches.find(x=>x.id===sess.substitute_coach_id):null;
      const coach=A.allCoaches.find(x=>x.id===g.coach_id);
      const displayCoach=subCoach||coach;
      const sailors=g.sailorIds||[];
      const att=sess?A.allAttendance[sess.id]||{}:{};
      const present=sailors.filter(id=>att[id]).length;
      const hasAtt=Object.keys(att).length>0;

      return`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;
        background:${isCancelled?"rgba(239,68,68,0.08)":"rgba(255,255,255,0.03)"};
        border-radius:10px;border:1px solid ${isCancelled?"rgba(239,68,68,0.3)":isPast?"var(--border)":"rgba(255,255,255,0.08)"};
        opacity:${isPast&&!sess?"0.5":"1"}">
        <div style="width:4px;height:40px;border-radius:2px;background:${isCancelled?"#ef4444":g.color};flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:800;font-size:14px;color:${isCancelled?"#ef4444":g.color};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
            ${isCancelled?"❌ ":""}${esc(g.name)}
          </div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:3px">
            ${coachAvatar(displayCoach,20)}
            <span style="font-size:12px;color:${subCoach?"var(--yellow)":"var(--muted)"}">
              ${subCoach?"🔄 ":""}${esc(displayCoach?.name||"")}
            </span>
            ${g.start_time?`<span style="font-size:11px;color:var(--muted)">· ${g.start_time}</span>`:""}
          </div>
        </div>
        <div style="text-align:left;flex-shrink:0">
          ${hasAtt
            ?`<div style="font-size:13px;font-weight:800;color:${present===sailors.length?"var(--green)":"var(--yellow)"}">${present}/${sailors.length}</div>
               <div style="font-size:10px;color:var(--muted)">נוכחים</div>`
            :`<div style="font-size:13px;font-weight:700;color:var(--muted)">${sailors.length}</div>
              <div style="font-size:10px;color:var(--muted)">חניכים</div>`
          }
        </div>
      </div>`;
    }).join("");

    rows+=`<div style="margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;padding:0 2px">
        <div style="font-size:13px;font-weight:800;color:${isToday?"var(--blue-light)":"var(--text)"}">
          ${dayName}
        </div>
        <div style="font-size:12px;color:var(--muted)">${dateLabel}</div>
        ${isToday?`<span style="font-size:10px;background:var(--blue);color:#fff;padding:1px 7px;border-radius:10px;font-weight:700">היום</span>`:""}
        <div style="flex:1;height:1px;background:${isToday?"var(--blue)":"var(--border)"}"></div>
        <div style="font-size:11px;color:var(--muted)">${scheduledGroups.length} קבוצות</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">${groupCards}</div>
    </div>`;
  }

  return`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <h2 style="font-size:20px;font-weight:800">👑 מסוף מנהל</h2>

function exportMonthlyCancellations(yr, mn){
  const mnStr=String(mn+1).padStart(2,"0");
  const canc=A.allSessions.filter(s=>s.cancelled&&s.date.startsWith(yr+"-"+mnStr));
  if(!canc.length){toast("אין דחיות לחודש זה");return;}
  const mName=new Intl.DateTimeFormat("he-IL",{month:"long",year:"numeric"}).format(new Date(yr,mn,1));
  const rows=[["תאריך","קבוצה","מדריך","סיבה"]];
  canc.sort((a,b)=>a.date.localeCompare(b.date)).forEach(s=>{
    const g=A.allGroups.find(x=>x.id===s.group_id);
    const coach=A.allCoaches.find(x=>x.id===g?.coach_id);
    rows.push([ff(s.date),g?.name||"",coach?.name||"",s.cancel_reason||""]);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`דחיות_${mName}.csv`;
  a.click();
  toast("📥 דוח דחיות יוצא");
}

async function saveAdminCoach(){
  const f=A.adminCoachForm;
  if(!f.id.trim()||!f.first_name.trim()||!f.last_name.trim()){toast("⚠️ נא למלא ת.ז., שם ושם משפחה");return;}
  const fullName=f.first_name.trim()+" "+f.last_name.trim();
  try{
    if(A.editCoachId){
      const lc=(f.login_code||"").trim();
      if(!lc){toast("⚠️ נא להזין תעודת זהות");return;}
      await dbPa("coaches",`id=eq.${A.editCoachId}`,{name:fullName,first_name:f.first_name.trim(),last_name:f.last_name.trim(),login_code:lc});
      const c=A.allCoaches.find(x=>x.id===A.editCoachId);
      if(c){c.name=fullName;c.first_name=f.first_name.trim();c.last_name=f.last_name.trim();c.login_code=lc;}
      toast("✅ מדריך עודכן");
    }else{
      const ex=await dbG("coaches",`id=eq.${f.id.trim()}`);
      if(ex.length){toast("⚠️ ת.ז. כבר קיימת");return;}
      const res=(await dbP("coaches",{id:f.id.trim(),name:fullName,first_name:f.first_name.trim(),last_name:f.last_name.trim(),login_code:f.login_code.trim()||f.id.trim(),approved:true,is_admin:false}))[0];
      A.allCoaches.push(res);toast("✅ מדריך נוסף!");
    }
    A.adminCoachForm={id:"",first_name:"",last_name:"",login_code:""};A.editCoachId=null;A.subView=null;renderPage();
  }catch(e){toast("❌ "+e.message);}
}
async function toggleApprove(id){

    toast(next?"✅ מדריך אושר":"🚫 מדריך חסום");

async function toggleIsAdmin(id){

              <div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border)">
                <span>${ff(h.date)} · ${h.start_time}–${h.end_time}${h.notes?" · "+esc(h.notes):""}</span>
                <span style="color:var(--green);font-weight:700">${fmtH(calcHours(h.start_time,h.end_time))}</span>
              </div>`).join("")}
          </div>`;
        }).join("")}
      </div>`;
    }).join("")}
  `;
}

// ── Admin Settings ───────────────────────────────────────────

    const g=A.allGroups.find(x=>x.id===A.activeGroupId);
    if(!g){A.subView=null;renderPage();return"";}
    const coach=A.allCoaches.find(c=>c.id===g.coach_id);

    const dayStr=(g.days_of_week||[]).map(d=>DL[d]).join(", ");
    const timeStr=g.start_time?(g.start_time+(g.end_time?"–"+g.end_time:"")):"";
    return`
      <button class="bbtn" onclick="A.subView=null;A.activeGroupId=null;renderPage()">← חזרה</button>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div style="width:14px;height:14px;border-radius:50%;background:${g.color}"></div>
        <h2 style="font-size:20px;font-weight:800">${esc(g.name)}</h2>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:4px">🧑‍🏫 ${esc(coach?.name||"")}${dayStr?" · 📆 "+dayStr:""}${timeStr?" · ⏰ "+timeStr:""}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
        <button class="btn btn-p" onclick="openSession(A.activeDate||td(),'${g.id}')">✅ נוכחות</button>

      </div>

        <div style="flex:1"><div style="font-weight:700;font-size:14px">${esc(s.first_name)} ${esc(s.last_name)}</div>

  return`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="font-size:20px;font-weight:800">🏊 ניהול קבוצות</h2>
      <button class="btn btn-p btn-sm" onclick="A.gf=egf();A.editGId=null;A.subView='addGroup';renderPage()">+ קבוצה חדשה</button>
    </div>
    ${allG.map(g=>{
      const coach=A.allCoaches.find(c=>c.id===g.coach_id);
      const dayStr=(g.days_of_week||[]).map(d=>DS[d]).join(" ");
      const timeStr=g.start_time?(g.start_time+(g.end_time?"–"+g.end_time:"")):"";
      return`<div class="gcard" onclick="A.activeGroupId='${g.id}';A.subView='groupDetail';renderPage()">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:12px;height:12px;border-radius:50%;background:${g.color};flex-shrink:0"></div>
            <div>
              <div style="font-weight:800;font-size:15px">${esc(g.name)}</div>
              <div style="font-size:11px;color:var(--muted)">🧑‍🏫 ${esc(coach?.name||"")}${dayStr?" · "+dayStr:""}${timeStr?" · "+timeStr:""}</div>
            </div>
          </div>
          <div style="display:flex;gap:6px" onclick="event.stopPropagation()">
            <button class="btn btn-g btn-sm" onclick="A.gf={name:'${g.name.replace(/'/g,"\'")}',color:'${g.color}',days_of_week:[...(${JSON.stringify(g.days_of_week||[])})],start_time:'${g.start_time||""}',end_time:'${g.end_time||""}',start_date:'${g.start_date||""}',coach_id:'${g.coach_id||""}'};A.editGId='${g.id}';A.subView='editGroup';renderPage()">✏️</button>
            <button class="btn btn-d btn-sm" onclick="delGroupAdmin('${g.id}')">מחק</button>
          </div>

      </div>`;
    }).join("")}
  `;
}
async function delGroupAdmin(id){
  if(!confirm("למחוק קבוצה זו?"))return;
  try{
    await dbD("groups",`id=eq.${id}`);
    A.allGroups=A.allGroups.filter(g=>g.id!==id);
    renderPage();toast("🗑️ נמחקה");
  }catch(e){toast("❌ "+e.message);}
}

// ── Profile ───────────────────────────────────────────────────
async function saveCoachField(field, value){
  try{
    await dbPa("coaches","id=eq."+A.coach.id,{[field]:value||null});
    A.coach[field]=value;
    if(field==="birth_date") checkBirthdays();
    toast("✅ נשמר");
  }catch(e){toast("❌ "+e.message);}
}

async function uploadAvatar(input){
  const file=input.files[0];if(!file)return;
  toast("⏳ מעלה תמונה...");
  try{
    const reader=new FileReader();
    reader.onload=async(e)=>{
      // Compress image using canvas
      const img2=new Image();
      img2.onload=async()=>{
        const canvas=document.createElement("canvas");
        const MAX=400;
        let w=img2.width,h=img2.height;
        if(w>h){if(w>MAX){h=h*MAX/w;w=MAX;}}else{if(h>MAX){w=w*MAX/h;h=MAX;}}
        canvas.width=w;canvas.height=h;
        canvas.getContext("2d").drawImage(img2,0,0,w,h);
        const base64=canvas.toDataURL("image/jpeg",0.85);
        await saveCoachField("avatar_url",base64);
        const hdrImg=document.getElementById("hdr-avatar-img");
        if(hdrImg)hdrImg.innerHTML=`<img src="${base64}" style="width:100%;height:100%;object-fit:cover">`;
        const sa=document.getElementById("settings-avatar");
        if(sa)sa.innerHTML=`<img src="${base64}" style="width:100%;height:100%;object-fit:cover"><div style="position:absolute;bottom:0;right:0;background:var(--blue);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px">✏️</div>`;
      };
      img2.src=e.target.result;
    };
    reader.readAsDataURL(file);
  }catch(e){toast("❌ "+e.message);}
}

function checkBirthdays(){
  const today=td();
  const todayMD=today.slice(5); // MM-DD
  const coaches=A.allCoaches||[A.coach];
  coaches.forEach(coach=>{
    if(!coach.birth_date)return;
    const bd=coach.birth_date.slice(5); // MM-DD
    if(bd===todayMD){
      setTimeout(()=>showBirthdayToast(coach.name),500);
    }
  });
}

function showBirthdayToast(name){
  const t=document.getElementById("toast");
  if(!t)return;
  t.textContent="🎂 יום הולדת שמח ל"+name+"! 🎉";
  t.style.background="linear-gradient(135deg,#f59e0b,#ec4899)";
  t.classList.add("show");
  setTimeout(()=>{t.classList.remove("show");t.style.background="";},5000);
}
