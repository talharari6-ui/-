<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a1628">
<title>חוג שייט | מרכז דניאל</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a1628;--bg2:#0d2444;--bg3:#0e3060;
  --card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.09);
  --blue:#3b82f6;--blue-light:#7dd3fc;
  --green:#34d399;--red:#f87171;--yellow:#fbbf24;--purple:#a78bfa;
  --text:#e0f2fe;--muted:#64748b;
  --radius:16px;--safe:env(safe-area-inset-bottom,0px)
}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);overflow:hidden}
#app{height:100vh;display:flex;flex-direction:column}
.hdr{background:rgba(0,0,0,0.5);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-title{font-size:15px;font-weight:800;color:var(--blue-light)}
.hdr-sub{font-size:10px;color:var(--muted)}
.hdr-out{margin-right:auto;background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:4px 8px;border-radius:6px}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:calc(150px + var(--safe));background:linear-gradient(160deg,var(--bg) 0%,var(--bg2) 50%,var(--bg3) 100%)}
.content-login{flex:1;overflow-y:auto;padding:32px 20px;display:flex;flex-direction:column;justify-content:center;background:linear-gradient(160deg,var(--bg) 0%,var(--bg2) 50%,var(--bg3) 100%)}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(5,10,25,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe);z-index:100}
.nb{flex:1;padding:8px 2px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);font-size:9px;font-weight:600}
.nb.active{color:var(--blue-light)}
.nb .ic{font-size:20px;line-height:1}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.sc{background:var(--card);border-radius:14px;padding:14px 10px;text-align:center;border:1px solid var(--border)}
.si{font-size:22px;margin-bottom:4px}
.sv{font-size:22px;font-weight:800}
.sl{font-size:10px;color:var(--muted);margin-top:2px}
.stitle{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px}
.btn{border:none;cursor:pointer;font-weight:700;border-radius:12px;padding:14px 20px;font-size:15px;width:100%;display:block;text-align:center;transition:opacity 0.15s}
.btn:active{opacity:0.8}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-p{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:white;box-shadow:0 4px 20px rgba(37,99,235,0.35)}
.btn-g{background:rgba(255,255,255,0.06);color:var(--muted);border:1px solid var(--border)}
.btn-d{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3)}
.btn-t{background:linear-gradient(135deg,#0891b2,#0e7490);color:white}
.btn-ex{background:linear-gradient(135deg,#166534,#15803d);color:white}
.btn-sh{background:linear-gradient(135deg,#1e40af,#1d4ed8);color:white}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:9px;width:auto;display:inline-block}
.btn-pur{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:white}
.fg{margin-bottom:14px}
.fl{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}
.fi{width:100%;background:rgba(0,0,0,0.35);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:10px;font-size:16px;outline:none;-webkit-appearance:none}
.fi:focus{border-color:var(--blue)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.trow{display:flex;gap:8px}
.tbtn{flex:1;padding:11px 8px;border-radius:10px;border:1px solid var(--border);background:rgba(0,0,0,0.2);color:var(--muted);font-weight:700;font-size:13px;cursor:pointer}
.tbtn.active{background:rgba(59,130,246,0.25);border-color:rgba(59,130,246,0.5);color:var(--blue-light)}
.spill{padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(0,0,0,0.2);color:var(--muted);font-weight:700;font-size:12px;cursor:pointer}
.spill.active{background:rgba(59,130,246,0.25);border-color:rgba(59,130,246,0.5);color:var(--blue-light)}
input[type=date],input[type=time]{color-scheme:dark}
select option{background:#0d2444}
.dpick{display:flex;gap:6px;flex-wrap:wrap}
.dpill{padding:9px 10px;border-radius:10px;border:1px solid var(--border);background:rgba(0,0,0,0.2);color:var(--muted);font-weight:700;font-size:13px;cursor:pointer;min-width:40px;text-align:center}
.dpill.active{background:rgba(59,130,246,0.25);border-color:rgba(59,130,246,0.5);color:var(--blue-light)}
.wnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px}
.wtitle{font-size:13px;font-weight:800;text-align:center;flex:1}
.warr{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:16px;flex-shrink:0}
.dblk{margin-bottom:14px}
.dhdr{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;padding:6px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.dhdr.today{color:var(--blue-light);border-bottom-color:rgba(59,130,246,0.4)}
.gcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;cursor:pointer}
.gcard:active{border-color:var(--blue-light)}
.scard{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.av-m{background:linear-gradient(135deg,#2563eb30,#1e40af40)}
.av-f{background:linear-gradient(135deg,#ec489930,#be185d40)}
.arow{display:flex;align-items:center;gap:12px;padding:14px;border-radius:14px;margin-bottom:8px;cursor:pointer;border:1px solid transparent;-webkit-user-select:none;user-select:none}
.arow.present{background:rgba(52,211,153,0.1);border-color:rgba(52,211,153,0.25)}
.arow.absent{background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.07)}
.achk{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;margin-right:auto}
.achk.present{background:rgba(52,211,153,0.25);border:2px solid var(--green);color:var(--green)}
.achk.absent{background:rgba(239,68,68,0.1);border:2px solid rgba(239,68,68,0.3);color:var(--red)}
.pbar{height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;margin-top:8px}
.pfill{height:100%;border-radius:3px}
.dots{display:flex;gap:3px;flex-wrap:wrap;margin-top:8px}
.dot{width:12px;height:12px;border-radius:3px}
.bbtn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0;margin-bottom:16px;display:flex;align-items:center;gap:4px}
.cpill{background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.3);border-radius:20px;padding:5px 14px;font-size:13px;font-weight:700;color:var(--green)}
.sitem{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer}
.sitem:active{border-color:var(--blue-light)}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:14px;font-weight:600;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.spin{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,0.2);border-top-color:white;border-radius:50%;animation:sp 0.7s linear infinite;vertical-align:middle;margin-left:8px}
@keyframes sp{to{transform:rotate(360deg)}}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.badge-w{background:rgba(239,68,68,0.2);color:var(--red)}
.badge-t{background:rgba(59,130,246,0.2);color:var(--blue-light);border-radius:6px;padding:1px 6px;font-size:10px;font-weight:700}
.admin-badge{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:white;border-radius:8px;padding:2px 8px;font-size:11px;font-weight:700}
.filter-row{display:flex;gap:8px;margin-bottom:12px}
.filter-btn{padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:rgba(0,0,0,0.2);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer}
.filter-btn.active{background:rgba(59,130,246,0.2);border-color:rgba(59,130,246,0.5);color:var(--blue-light)}
.hours-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px}
.admin-section{background:rgba(124,58,237,0.08);border:1px solid rgba(124,58,237,0.2);border-radius:var(--radius);padding:16px;margin-bottom:12px}
@media(min-width:500px){
  .content,.content-login{max-width:480px;margin:0 auto}
  .bnav{max-width:480px;left:50%;transform:translateX(-50%);border-radius:20px 20px 0 0}
}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <span style="font-size:24px">⛵</span>
    <div>
      <div class="hdr-title">מרכז דניאל לחתירה</div>
      <div class="hdr-sub" id="hdr-sub">חוג שייט | עיריית תל אביב-יפו</div>
    </div>
    <button class="hdr-out" id="logout-btn" onclick="logout()" style="display:none">יציאה ↩</button>
  </div>
  <div id="mc" class="content-login">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;color:var(--muted)">
      <div class="spin" style="width:36px;height:36px;border-width:3px"></div><p>טוען...</p>
    </div>
  </div>
  <nav class="bnav" id="bnav" style="display:none">
    <button class="nb active" id="nav-schedule" onclick="nav('schedule')"><span class="ic">📅</span>לוח</button>
    <button class="nb"        id="nav-hours"    onclick="nav('hours')">   <span class="ic">⏱️</span>שעות</button>
    <button class="nb"        id="nav-sailors"  onclick="nav('sailors')"> <span class="ic">👥</span>חניכים</button>
    <button class="nb"        id="nav-history"  onclick="nav('history')"> <span class="ic">📊</span>היסטוריה</button>
    <button class="nb"        id="nav-settings" onclick="nav('settings')"><span class="ic">⚙️</span>הגדרות</button>
  </nav>
</div>
<div class="toast" id="toast"></div>
<script>
const SUPA_URL="https://ukmjspvhvughrdjexqwu.supabase.co";
const SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVrbWpzcHZodnVnaHJkamV4cXd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NTg0NjAsImV4cCI6MjA4ODAzNDQ2MH0.ZnMMPuN6qiC5eMO2c5-t00KX_HKu7ynLzrIaUB9C8dY";
const ADMIN_ID="999999999"; // ת"ז מנהל
const BOATS=["Optimist","RS Feva","RS Toura"];
const SIZES=["XS","S","M","L","XL","XXL"];
const COLORS=["#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6","#06b6d4","#ec4899"];
const DS=["א׳","ב׳","ג׳","ד׳","ה׳","ו׳","ש׳"];
const DL=["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];

let A={
  coach:null,isAdmin:false,
  groups:[],sailors:[],sessions:[],attendance:{},
  allCoaches:[],allGroups:[],allSailors:[],allSessions:[],allAttendance:{},workHours:[],
  view:"schedule",subView:null,
  activeGroupId:null,activeSession:null,activeDate:null,
  form:ef(),editId:null,
  gf:egf(),editGId:null,
  weekOffset:0,scheduleFilter:"all",
  hForm:{date:td(),start_time:"",end_time:"",notes:""},editHId:null,
};
function ef(){return{first_name:"",last_name:"",birth_date:"",join_date:td(),shirt_size:"M",parent_name:"",parent_phone:"",gender:"male",boat:"Optimist"};}
function egf(){return{name:"",color:COLORS[0],days_of_week:[],start_time:"",end_time:""};}

// ── Supabase ──────────────────────────────────────────────────
async function sb(path,method="GET",body=null){
  const h={"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY,"Content-Type":"application/json","Prefer":method==="POST"?"return=representation":""};
  const opts={method,headers:h};
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(SUPA_URL+"/rest/v1/"+path,opts);
  if(!res.ok){const e=await res.text();throw new Error(e);}
  const t=await res.text();return t?JSON.parse(t):null;
}
const dbG=(t,q="",o="created_at.asc")=>sb(t+"?"+q+(o?"&order="+o:""));
const dbP=(t,b)=>sb(t,"POST",b);
const dbPa=(t,q,b)=>sb(t+"?"+q,"PATCH",b);
const dbD=(t,q)=>sb(t+"?"+q,"DELETE");

// ── Helpers ───────────────────────────────────────────────────
function td(){return new Date().toISOString().split("T")[0];}
function addD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function toISO(d){return d.toISOString().split("T")[0];}
function fs(d){if(!d)return"";const dt=new Date(d+"T00:00:00");return String(dt.getDate()).padStart(2,"0")+"/"+String(dt.getMonth()+1).padStart(2,"0");}
function ff(d){if(!d)return"";const dt=new Date(d+"T00:00:00");return fs(d)+"/"+dt.getFullYear();}
function fl(d){if(!d)return"";return new Intl.DateTimeFormat("he-IL",{weekday:"long",year:"numeric",month:"long",day:"numeric"}).format(new Date(d+"T00:00:00"));}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");}
function toast(msg,ms=2200){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),ms);}
function rc(r){if(r===null)return"#64748b";return r>=75?"#34d399":r>=50?"#fbbf24":"#f87171";}
function getG(id){return A.groups.find(g=>g.id===id);}
function gSailors(gid){const g=getG(gid);if(!g)return[];return(g.sailorIds||[]).map(id=>A.sailors.find(s=>s.id===id)).filter(Boolean);}
function gSess(gid){return A.sessions.filter(s=>s.group_id===gid);}
function aRate(sailor,sessions){
  const jd=sailor.join_date||"2000-01-01";
  const rel=sessions.filter(s=>s.date>=jd&&A.attendance[s.id]&&A.attendance[s.id][sailor.id]!==undefined);
  if(!rel.length)return null;
  return Math.round(rel.filter(s=>A.attendance[s.id][sailor.id]).length/rel.length*100);
}
function sloc(){try{return localStorage.getItem("sailing_last");}catch(e){return null;}}
function ssave(){try{localStorage.setItem("sailing_last",A.coach?.id||"");}catch(e){}}
function wkStart(off=0){const d=new Date();d.setDate(d.getDate()-d.getDay()+off*7);d.setHours(0,0,0,0);return d;}
function calcHours(s,e){
  if(!s||!e)return 0;
  const [sh,sm]=s.split(":").map(Number);
  const [eh,em]=e.split(":").map(Number);
  return Math.max(0,((eh*60+em)-(sh*60+sm))/60);
}
function fmtH(h){return h%1===0?h+"ש'":h.toFixed(1)+"ש'";}

// ── Load ──────────────────────────────────────────────────────
async function loadAll(){
  const cid=A.coach.id;
  const groups=await dbG("groups",`coach_id=eq.${cid}`);
  const gids=groups.map(g=>g.id);
  let gsMap={};
  if(gids.length){
    const gs=await dbG("group_sailors",`group_id=in.(${gids.join(",")})`, "");
    gs.forEach(r=>{if(!gsMap[r.group_id])gsMap[r.group_id]=[];gsMap[r.group_id].push(r.sailor_id);});
  }
  A.groups=groups.map(g=>({...g,sailorIds:gsMap[g.id]||[],days_of_week:g.days_of_week||[]}));
  const sids2=[...new Set(A.groups.flatMap(g=>g.sailorIds))];
  A.sailors=sids2.length?await dbG("sailors",`id=in.(${sids2.join(",")})`):[]; 
  A.sessions=gids.length?await dbG("sessions",`group_id=in.(${gids.join(",")})`):[]; 
  A.attendance={};
  const sids=A.sessions.map(s=>s.id);
  if(sids.length){
    const att=await dbG("attendance",`session_id=in.(${sids.join(",")})`, "");
    att.forEach(r=>{if(!A.attendance[r.session_id])A.attendance[r.session_id]={};A.attendance[r.session_id][r.sailor_id]=r.present;});
  }
  // work hours
  A.workHours=await dbG("work_hours",`coach_id=eq.${cid}`,"date.desc");
}

async function loadScheduleData(){
  A.allCoaches=await dbG("coaches","","name.asc");
  A.allGroups=(await dbG("groups","","name.asc")).map(g=>({...g,days_of_week:g.days_of_week||[]}));
}

async function loadAdminData(){
  A.allCoaches=await dbG("coaches","","name.asc");
  A.allGroups=(await dbG("groups","","name.asc")).map(g=>({...g,days_of_week:g.days_of_week||[]}));
  A.allSailors=await dbG("sailors","","last_name.asc");
  A.allSessions=await dbG("sessions","","date.desc");
  // work hours all
  const wh=await dbG("work_hours","","date.desc");
  A.workHours=wh;
  // attendance for all sessions
  const sids=A.allSessions.map(s=>s.id);
  A.allAttendance={};
  if(sids.length){
    // fetch in chunks to avoid URL limit
    for(let i=0;i<sids.length;i+=50){
      const chunk=sids.slice(i,i+50);
      const att=await dbG("attendance",`session_id=in.(${chunk.join(",")})`, "");
      att.forEach(r=>{if(!A.allAttendance[r.session_id])A.allAttendance[r.session_id]={};A.allAttendance[r.session_id][r.sailor_id]=r.present;});
    }
  }
  // group sailors map
  const gids=A.allGroups.map(g=>g.id);
  let gsMap={};
  if(gids.length){
    const gs=await dbG("group_sailors",`group_id=in.(${gids.join(",")})`, "");
    gs.forEach(r=>{if(!gsMap[r.group_id])gsMap[r.group_id]=[];gsMap[r.group_id].push(r.sailor_id);});
  }
  A.allGroups=A.allGroups.map(g=>({...g,sailorIds:gsMap[g.id]||[]}));
}

// ── Auth ──────────────────────────────────────────────────────
async function tryLogin(){
  const id=(document.getElementById("lid")?.value||"").trim();
  const name=(document.getElementById("lname")?.value||"").trim();
  if(!id){toast("⚠️ נא להזין תעודת זהות");return;}
  const btn=document.getElementById("lbtn");
  btn.disabled=true;btn.innerHTML='טוען... <span class="spin"></span>';
  try{
    if(id===ADMIN_ID){
      // admin login
      A.coach={id:ADMIN_ID,name:"מנהל"};A.isAdmin=true;
      ssave();await loadAdminData();showApp();return;
    }
    const ex=await dbG("coaches",`id=eq.${id}`);
    if(ex.length){A.coach=ex[0];A.isAdmin=false;}
    else{
      if(!name){toast("⚠️ נא להזין שמך");btn.disabled=false;btn.textContent="כניסה →";return;}
      A.coach=(await dbP("coaches",{id,name}))[0];A.isAdmin=false;
    }
    ssave();await loadAll();showApp();
  }catch(e){toast("❌ "+e.message);btn.disabled=false;btn.textContent="כניסה →";}
}

async function logout(){
  A={...A,coach:null,isAdmin:false,groups:[],sailors:[],sessions:[],attendance:{},allCoaches:[],allGroups:[],allSailors:[],allSessions:[],allAttendance:{},workHours:[],view:"schedule",subView:null,activeGroupId:null,activeSession:null,activeDate:null};
  document.getElementById("bnav").style.display="none";
  document.getElementById("logout-btn").style.display="none";

// ── Session ───────────────────────────────────────────────────
async function openSession(date,gid){
  A.activeGroupId=gid;
  // Find the group — could be from allGroups if another coach's group
  const myG=getG(gid);
  const anyG=myG||A.allGroups.find(g=>g.id===gid);
  const sailorIds=anyG?.sailorIds||[];

  // Ensure the group is accessible in A.groups for session rendering
  if(!myG&&anyG){
    // Temporarily add to groups for rendering
    A.groups.push({...anyG});
    const sids2=[...new Set([...A.sailors.map(s=>s.id),...sailorIds])];
    if(sailorIds.length){
      const newSailors=await dbG("sailors",`id=in.(${sailorIds.join(",")})`, "last_name.asc");
      newSailors.forEach(s=>{if(!A.sailors.find(x=>x.id===s.id))A.sailors.push(s);});
    }
  }

  const existing=A.sessions.find(s=>s.date===date&&s.group_id===gid);
  if(existing){
    A.activeSession={...existing};
    if(!A.attendance[existing.id])A.attendance[existing.id]={};
    for(const sid of sailorIds){
      if(A.attendance[existing.id][sid]===undefined){
        A.attendance[existing.id][sid]=false;
        try{await dbP("attendance",{session_id:existing.id,sailor_id:sid,present:false});}catch(e){}
      }
    }
  }else{
    try{
      const sess=(await dbP("sessions",{group_id:gid,date}))[0];
      A.sessions.push(sess);A.activeSession={...sess};A.attendance[sess.id]={};
      for(const sid of sailorIds){
        await dbP("attendance",{session_id:sess.id,sailor_id:sid,present:false});
        A.attendance[sess.id][sid]=false;
      }
    }catch(e){toast("❌ "+e.message);return;}
  }
  A.subView="session";renderPage();
}

async function toggleAtt(sid){
  const sess=A.activeSession;if(!sess)return;
  const next=!(A.attendance[sess.id]?.[sid]||false);
  if(!A.attendance[sess.id])A.attendance[sess.id]={};
  A.attendance[sess.id][sid]=next;
  document.getElementById("arow-"+sid)?.setAttribute("class","arow "+(next?"present":"absent"));
  const chk=document.getElementById("achk-"+sid);
  if(chk){chk.className="achk "+(next?"present":"absent");chk.textContent=next?"✓":"✗";}
  const cnt=Object.values(A.attendance[sess.id]).filter(Boolean).length;
  const tot=Object.keys(A.attendance[sess.id]).length;
  const ctr=document.getElementById("actr");if(ctr)ctr.textContent=cnt+"/"+tot;
  try{await dbPa("attendance",`session_id=eq.${sess.id}&sailor_id=eq.${sid}`,{present:next});}
  catch(e){toast("❌ שגיאת שמירה");}
}
async function toggleAll(){
  const sess=A.activeSession;if(!sess)return;
  const att=A.attendance[sess.id]||{};const ids=Object.keys(att);
  const next=!ids.every(id=>att[id]);
  ids.forEach(id=>{A.attendance[sess.id][id]=next;});renderPage();
  try{for(const sid of ids)await dbPa("attendance",`session_id=eq.${sess.id}&sailor_id=eq.${sid}`,{present:next});}
  catch(e){toast("❌ שגיאה");}
}

// ── Export ────────────────────────────────────────────────────
function toCSV(rows){return rows.map(r=>r.map(c=>{const s=String(c??"");return(s.includes(",")||s.includes('"')||s.includes("\n"))?`"${s.replace(/"/g,'""')}"`:s;}).join(",")).join("\n");}
function dlCSV(content,name){const blob=new Blob(["\uFEFF"+content],{type:"text/csv;charset=utf-8;"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click();}
function exportGroup(gid){
  const g=getG(gid);if(!g)return;
  const sess=gSess(gid).sort((a,b)=>a.date.localeCompare(b.date));
  const sailors=gSailors(gid);
  const rows=[["שם מלא","סירה","הצטרפות",...sess.map(s=>fs(s.date)),"%"],...sailors.map(s=>{
    const jd=s.join_date||"2000-01-01";
    const rel=sess.filter(x=>x.date>=jd);
    const marks=sess.map(x=>{if(x.date<jd)return"—";return(A.attendance[x.id]||{})[s.id]?"✓":"✗";});
    const pct=rel.length?Math.round(rel.filter(x=>(A.attendance[x.id]||{})[s.id]).length/rel.length*100)+"%":"—";
    return[s.first_name+" "+s.last_name,s.boat,s.join_date||"",...marks,pct];
  })];
  dlCSV(toCSV(rows),`${g.name}_${td()}.csv`);toast("📥 הורד!");
}
function exportHours(){
  const rows=[["תאריך","כניסה","יציאה","שעות","הערות"],...A.workHours.map(h=>[h.date,h.start_time,h.end_time,calcHours(h.start_time,h.end_time).toFixed(1),h.notes||""])];
  dlCSV(toCSV(rows),`שעות_${A.coach?.name||""}_${td()}.csv`);toast("📥 הורד!");
}

// ── Schedule ──────────────────────────────────────────────────
function rSchedule(isAdmin=false){
  const off=A.weekOffset;
  const ws=wkStart(off);
  const days=Array.from({length:7},(_,i)=>addD(ws,i));
  const todayStr=td();

  const map={};days.forEach(d=>{map[toISO(d)]=[];});
  A.allGroups.forEach(g=>{
    const coach=A.allCoaches.find(c=>c.id===g.coach_id);
    const isMe=g.coach_id===A.coach?.id;
    (g.days_of_week||[]).forEach(dow=>{
      const dayD=days.find(d=>d.getDay()===dow);
      if(dayD){const ds=toISO(dayD);if(map[ds])map[ds].push({g,coach,isMe});}
    });
  });

  const filterHtml=!isAdmin?`
    <div class="filter-row">
      <button class="filter-btn ${A.scheduleFilter==="all"?"active":""}" onclick="A.scheduleFilter='all';renderPage()">📅 הכל</button>
      <button class="filter-btn ${A.scheduleFilter==="mine"?"active":""}" onclick="A.scheduleFilter='mine';renderPage()">⭐ רק שלי</button>
    </div>`:"";

  return`
    <h2 style="font-size:20px;font-weight:800;margin-bottom:10px">📅 לוח שבועי</h2>
    ${filterHtml}
    <div class="wnav">
      <button class="warr" onclick="A.weekOffset--;nav('${isAdmin?"admin-schedule":"schedule"}')">&#8594;</button>
      <div class="wtitle">${ff(toISO(days[0]))} – ${ff(toISO(days[6]))}</div>
      <button class="warr" onclick="A.weekOffset++;nav('${isAdmin?"admin-schedule":"schedule"}')">&#8592;</button>
    </div>
    ${off!==0?`<button class="btn btn-g btn-sm" style="margin-bottom:12px" onclick="A.weekOffset=0;nav('${isAdmin?"admin-schedule":"schedule"}')">↩ חזור להיום</button>`:""}
    ${days.map(d=>{
      const ds=toISO(d);
      let items=map[ds]||[];
      if(!isAdmin&&A.scheduleFilter==="mine")items=items.filter(x=>x.isMe);
      const isToday=ds===todayStr;
      const dow=d.getDay();
      return`<div class="dblk">
        <div class="dhdr ${isToday?"today":""}">
          <span>${DL[dow]} ${ff(ds)}</span>
          ${isToday?`<span class="badge-t">היום</span>`:""}
        </div>
        ${items.length===0?`<div style="font-size:12px;color:var(--muted);padding:6px 0 2px;padding-right:4px">אין פעילות</div>`
        :items.map(({g,coach,isMe})=>`
          <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;border-right:3px solid ${g.color};${isMe||isAdmin?"":"opacity:0.55"}overflow:hidden">
            <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer" onclick="A.activeGroupId='${g.id}';A.activeDate='${ds}';A.subView='groupDetail';renderPage()">
              <div style="width:8px;height:8px;border-radius:50%;background:${g.color};flex-shrink:0"></div>
              <div style="flex:1;min-width:0">
                <div style="font-weight:700;font-size:13px">${esc(g.name)}${isMe?` <span style="font-size:10px;color:var(--green);font-weight:700">● שלי</span>`:""}</div>
                <div style="font-size:11px;color:var(--muted)">${esc(coach?.name||"")}${g.start_time?" · ⏰ "+g.start_time+(g.end_time?"–"+g.end_time:""):""}</div>
              </div>
              <span style="font-size:11px;color:var(--muted)">← פתח</span>
            </div>
            <div style="display:flex;border-top:1px solid var(--border)">
              <button style="flex:1;padding:9px 4px;background:none;border:none;border-left:1px solid var(--border);color:var(--green);font-size:12px;font-weight:700;cursor:pointer" onclick="openSession('${ds}','${g.id}')">✅ נוכחות</button>
              <button style="flex:1;padding:9px 4px;background:none;border:none;border-left:1px solid var(--border);color:var(--blue-light);font-size:12px;font-weight:700;cursor:pointer" onclick="A.activeGroupId='${g.id}';A.activeDate='${ds}';A.subView='assignSailors';renderPage()">👥 חניכים</button>
              <button style="flex:1;padding:9px 4px;background:none;border:none;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer" onclick="A.activeGroupId='${g.id}';A.activeDate='${ds}';A.subView='groupDetail';renderPage()">📋 פרטים</button>
            </div>
          </div>`).join("")}
      </div>`;
    }).join("")}

function rHours(){
  const totalH=A.workHours.reduce((s,h)=>s+calcHours(h.start_time,h.end_time),0);
  // group by month
  const byMonth={};
  A.workHours.forEach(h=>{
    const m=h.date.substr(0,7);
    if(!byMonth[m])byMonth[m]=[];byMonth[m].push(h);
  });
  return`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="font-size:20px;font-weight:800">⏱️ שעות עבודה</h2>
      <div style="display:flex;gap:6px">
        <button class="btn btn-ex btn-sm" onclick="exportHours()">📥</button>
        <button class="btn btn-p btn-sm" onclick="A.hForm={date:td(),start_time:'',end_time:'',notes:''};A.editHId=null;A.subView='addHours';renderPage()">+ הוסף</button>
      </div>
    </div>
    <div style="background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.2);border-radius:14px;padding:16px;margin-bottom:16px;text-align:center">
      <div style="font-size:32px;font-weight:800;color:var(--green)">${fmtH(totalH)}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">סה"כ שעות מתועדות</div>
    </div>
    ${Object.keys(byMonth).sort((a,b)=>b.localeCompare(a)).map(m=>{
      const hrs=byMonth[m];
      const mTotal=hrs.reduce((s,h)=>s+calcHours(h.start_time,h.end_time),0);
      const [yr,mn]=m.split("-");
      const mName=new Intl.DateTimeFormat("he-IL",{month:"long",year:"numeric"}).format(new Date(+yr,+mn-1,1));
      return`<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div style="font-weight:700;font-size:14px">${mName}</div>
          <div style="font-size:14px;font-weight:800;color:var(--green)">${fmtH(mTotal)}</div>
        </div>
        ${hrs.map(h=>`
          <div class="hours-item">
            <div>
              <div style="font-weight:700;font-size:13px">${ff(h.date)}</div>
              <div style="font-size:12px;color:var(--muted)">⏰ ${h.start_time}–${h.end_time} · ${fmtH(calcHours(h.start_time,h.end_time))}${h.notes?` · ${esc(h.notes)}`:""}</div>
            </div>
            <div style="display:flex;gap:6px">
              <button class="btn btn-g btn-sm" onclick="editHours('${h.id}')">✏️</button>
              <button class="btn btn-d btn-sm" onclick="delHours('${h.id}')">✕</button>
            </div>
          </div>`).join("")}
      </div>`;
    }).join("")}
    ${A.workHours.length===0?`<div style="text-align:center;padding:40px;color:var(--muted)"><div style="font-size:40px">⏱️</div><p style="margin-top:12px">עוד לא הוזנו שעות</p></div>`:""}
  `;
}

    ${ids.map(sid=>{
      const s=A.sailors.find(x=>x.id===sid);const p=att[sid];
      return`<div id="arow-${sid}" class="arow ${p?"present":"absent"}" onclick="toggleAtt('${sid}')">
        <div class="av av-${s?.gender==="female"?"f":"m"}" style="width:38px;height:38px;font-size:18px">${s?.gender==="female"?"👧":"👦"}</div>
        <div><div style="font-weight:700;font-size:15px">${s?esc(s.first_name)+" "+esc(s.last_name):"?"}</div><div style="font-size:11px;color:var(--muted)">${s?.boat||""}</div></div>
        <div id="achk-${sid}" class="achk ${p?"present":"absent"}">${p?"✓":"✗"}</div>
      </div>`;
    }).join("")}
    <div style="text-align:center;margin-top:12px;font-size:12px;color:var(--muted)">💾 נשמר אוטומטית לשרת</div>`}
  `;
}

// ── History ───────────────────────────────────────────────────
function rHistory(){
  if(!A.groups.length)return`<h2 style="font-size:20px;font-weight:800;margin-bottom:20px">📊 היסטוריה</h2>
    <div style="text-align:center;padding:60px 0;color:var(--muted)"><div style="font-size:48px">📊</div><p>עוד אין נתונים</p></div>`;
  return`<h2 style="font-size:20px;font-weight:800;margin-bottom:16px">📊 היסטוריה</h2>
    ${A.groups.map(g=>{
      const sess=gSess(g.id).sort((a,b)=>a.date.localeCompare(b.date));
      const sailors=gSailors(g.id);
      if(!sess.length&&!sailors.length)return"";
      return`<div class="card" style="border-right:3px solid ${g.color}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div style="font-weight:800;font-size:15px">${esc(g.name)}</div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-ex btn-sm" onclick="exportGroup('${g.id}')">📥</button>
            <button class="btn btn-sh btn-sm" onclick="exportGroup('${g.id}');setTimeout(()=>window.open('https://sheets.new','_blank'),400)">📊</button>
          </div>
        </div>
        ${sailors.length===0?`<p style="color:var(--muted);font-size:12px">אין חניכים</p>`
        :sailors.map(s=>{
          const r=aRate(s,sess);const col=rc(r);
          const jd=s.join_date||"2000-01-01";
          const rel=sess.filter(x=>x.date>=jd);
          const att=rel.filter(x=>(A.attendance[x.id]||{})[s.id]).length;
          const missed=rel.length-att;
          const dots=sess.slice(-12).map(x=>{
            if(x.date<jd)return`<div class="dot" style="background:#1e3a5f"></div>`;
            const p=(A.attendance[x.id]||{})[s.id];
            return`<div class="dot" style="background:${p?"#34d399":"#ef4444"};opacity:${p?0.8:0.4}"></div>`;
          }).join("");
          return`<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div><span style="font-weight:700;font-size:13px">${esc(s.first_name)} ${esc(s.last_name)}</span>
              ${missed>=3?`<span class="badge badge-w" style="margin-right:6px">⚠️ ${missed}</span>`:""}</div>
              <div><span style="font-size:17px;font-weight:800;color:${col}">${r!==null?r+"%":"—"}</span><span style="font-size:10px;color:var(--muted);margin-right:4px">${att}/${rel.length}</span></div>
            </div>
            <div class="pbar"><div class="pfill" style="width:${r||0}%;background:${col}"></div></div>
            <div class="dots">${dots}</div>
          </div>`;
        }).join("")}
      </div>`;
    }).join("")}`;
}

// ── ADMIN VIEWS ───────────────────────────────────────────────
function rAdminOverview(){
  const totalHours=A.workHours.reduce((s,h)=>s+calcHours(h.start_time,h.end_time),0);
  const totalAtt=Object.values(A.allAttendance).reduce((s,att)=>s+Object.values(att).filter(Boolean).length,0);
  return`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
      <h2 style="font-size:22px;font-weight:800">👑 מסוף מנהל</h2>
      <span class="admin-badge">ADMIN</span>
    </div>
    <div class="sgrid">
      <div class="sc"><div class="si">🧑‍🏫</div><div class="sv" style="color:var(--blue)">${A.allCoaches.length}</div><div class="sl">מדריכים</div></div>
      <div class="sc"><div class="si">👥</div><div class="sv" style="color:var(--green)">${A.allSailors.length}</div><div class="sl">חניכים</div></div>
      <div class="sc"><div class="si">🏊</div><div class="sv" style="color:var(--yellow)">${A.allGroups.length}</div><div class="sl">קבוצות</div></div>
    </div>
    <div class="sgrid">
      <div class="sc"><div class="si">📅</div><div class="sv" style="color:var(--purple)">${A.allSessions.length}</div><div class="sl">מפגשים</div></div>
      <div class="sc"><div class="si">✅</div><div class="sv" style="color:var(--green)">${totalAtt}</div><div class="sl">נוכחויות</div></div>
      <div class="sc"><div class="si">⏱️</div><div class="sv" style="color:var(--blue-light)">${fmtH(totalHours)}</div><div class="sl">שעות</div></div>
    </div>
    <div class="stitle">מדריכים — סיכום שעות</div>
    ${A.allCoaches.map(c=>{
      const cHours=A.workHours.filter(h=>h.coach_id===c.id).reduce((s,h)=>s+calcHours(h.start_time,h.end_time),0);
      const cGroups=A.allGroups.filter(g=>g.coach_id===c.id);
      const cSessions=A.allSessions.filter(s=>cGroups.find(g=>g.id===s.group_id));
      return`<div class="card" style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:700;font-size:14px">🧑‍🏫 ${esc(c.name)}</div>
            <div style="font-size:11px;color:var(--muted)">${cGroups.length} קבוצות · ${cSessions.length} מפגשים</div>
          </div>
          <div style="text-align:left">
            <div style="font-size:18px;font-weight:800;color:var(--blue-light)">${fmtH(cHours)}</div>
            <div style="font-size:10px;color:var(--muted)">שעות מתועדות</div>
          </div>
        </div>
      </div>`;
    }).join("")}
  `;
}

function rAdminCoaches(){
  return`
    <h2 style="font-size:20px;font-weight:800;margin-bottom:16px">🧑‍🏫 מדריכים</h2>
    ${A.allCoaches.map(c=>{
      const cGroups=A.allGroups.filter(g=>g.coach_id===c.id);
      const cSailors=new Set(cGroups.flatMap(g=>g.sailorIds||[])).size;
      return`<div class="card">
        <div style="font-weight:800;font-size:15px;margin-bottom:6px">🧑‍🏫 ${esc(c.name)} <span style="font-size:11px;color:var(--muted);font-weight:400">ת"ז: ${c.id}</span></div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:8px">${cGroups.length} קבוצות · ${cSailors} חניכים</div>
        ${cGroups.length?`<div style="display:flex;gap:5px;flex-wrap:wrap">${cGroups.map(g=>`
          <div style="background:${g.color}22;border:1px solid ${g.color}55;border-radius:8px;padding:4px 10px;font-size:11px;color:${g.color};font-weight:700">
            ${esc(g.name)}${g.start_time?" · "+g.start_time+(g.end_time?"–"+g.end_time:""):""}
          </div>`).join("")}</div>`:""}
      </div>`;
    }).join("")}
  `;
}

function rAdminSailors(){
  return`
    <h2 style="font-size:20px;font-weight:800;margin-bottom:16px">👥 כל החניכים (${A.allSailors.length})</h2>
    ${A.allSailors.map(s=>{
      const groups=A.allGroups.filter(g=>(g.sailorIds||[]).includes(s.id));
      return`<div class="scard">
        <div class="av av-${s.gender==="female"?"f":"m"}">${s.gender==="female"?"👧":"👦"}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:14px">${esc(s.first_name)} ${esc(s.last_name)}</div>
          <div style="font-size:11px;color:var(--muted)">🚢 ${s.boat} · 👕 ${s.shirt_size}</div>
          ${groups.length?`<div style="margin-top:3px">${groups.map(g=>`<span style="background:${g.color}22;border:1px solid ${g.color}55;border-radius:6px;padding:1px 6px;font-size:10px;color:${g.color};margin-left:3px">${esc(g.name)}</span>`).join("")}</div>`:""}
        </div>
      </div>`;
    }).join("")}
    ${A.allSailors.length===0?`<div style="text-align:center;padding:60px 0;color:var(--muted)"><div style="font-size:48px">👥</div><p>אין חניכים</p></div>`:""}
  `;
}

function rAdminHours(){
  // group by coach
  return`
    <h2 style="font-size:20px;font-weight:800;margin-bottom:16px">⏱️ שעות מדריכים</h2>
    ${A.allCoaches.map(c=>{
      const cHours=A.workHours.filter(h=>h.coach_id===c.id);
      const total=cHours.reduce((s,h)=>s+calcHours(h.start_time,h.end_time),0);
      if(!cHours.length)return`<div class="card" style="margin-bottom:8px">
        <div style="font-weight:700">${esc(c.name)}</div>
        <div style="font-size:12px;color:var(--muted)">אין רשומות</div>
      </div>`;
      // group by month
      const byM={};
      cHours.forEach(h=>{const m=h.date.substr(0,7);if(!byM[m])byM[m]=[];byM[m].push(h);});
      return`<div class="card" style="border-right:3px solid var(--purple)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div style="font-weight:800;font-size:15px">🧑‍🏫 ${esc(c.name)}</div>
          <div style="font-size:18px;font-weight:800;color:var(--blue-light)">${fmtH(total)}</div>
        </div>
        ${Object.keys(byM).sort((a,b)=>b.localeCompare(a)).map(m=>{
          const hrs=byM[m];
          const mT=hrs.reduce((s,h)=>s+calcHours(h.start_time,h.end_time),0);
          const [yr,mn]=m.split("-");
          const mName=new Intl.DateTimeFormat("he-IL",{month:"long",year:"numeric"}).format(new Date(+yr,+mn-1,1));
          return`<div style="margin-bottom:8px">
            <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:4px">${mName} — ${fmtH(mT)}</div>
            ${hrs.map(h=>`
              <div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border)">
                <span>${ff(h.date)} · ${h.start_time}–${h.end_time}${h.notes?" · "+esc(h.notes):""}</span>
                <span style="color:var(--green);font-weight:700">${fmtH(calcHours(h.start_time,h.end_time))}</span>
              </div>`).join("")}
          </div>`;
        }).join("")}
      </div>`;
    }).join("")}
  `;
}

// ── Init ──────────────────────────────────────────────────────
(async()=>{
  const last=sloc();
  if(last){
    try{
      if(last===ADMIN_ID){
        A.coach={id:ADMIN_ID,name:"מנהל"};A.isAdmin=true;
        await loadAdminData();showApp();return;
      }
      const res=await dbG("coaches",`id=eq.${last}`);
      if(res.length){A.coach=res[0];A.isAdmin=false;await loadAll();showApp();return;}
    }catch(e){}
  }
  renderLogin();
})();
</script>
